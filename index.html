<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بورد المحتوى</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    /* A to Z identity — navy on white */
    --bg:#F4F6FA; --panel:#FFFFFF; --raised:#F7F9FC; --raised2:#EDF1F7;
    --line:#E2E8F0; --line2:#D2DBE8;
    --txt:#16223D; --muted:#64718A; --faint:#9AA6BC;
    --brand:#1B2A4A; --brand-dim:#E7ECF5;        /* navy primary */
    --idea:#4A6FB5; --doing:#E0922A; --review:#8B5CC2; --ready:#23A66B; --pub:#4F7A9E;
    --danger:#D64545; --danger-dim:#FBE7E7;
    --radius:14px; --radius-s:10px; --shadow:0 8px 26px rgba(27,42,74,.12);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Tajawal',system-ui,sans-serif;
    background:radial-gradient(1100px 500px at 90% -10%, #EAF0FA 0%, transparent 55%),
      radial-gradient(800px 450px at -10% 110%, #EEF1F7 0%, transparent 50%), var(--bg);
    color:var(--txt);font-size:14px;line-height:1.5;min-height:100%;-webkit-font-smoothing:antialiased}
  .mono{font-family:'Space Mono',monospace;font-variant-numeric:tabular-nums}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font-family:inherit;font-size:14px}
  ::selection{background:var(--brand);color:#fff}

  /* ---------- Auth screen ---------- */
  .auth-wrap{min-height:100vh;display:grid;place-items:center;padding:24px}
  .auth{width:400px;max-width:100%;background:var(--panel);border:1px solid var(--line2);border-radius:20px;padding:34px 30px;box-shadow:var(--shadow)}
  .auth .logo{width:auto;height:64px;display:block;margin:0 auto 18px}
  .auth .logo img{height:64px;width:auto;object-fit:contain}
  .auth h1{text-align:center;font-size:22px;font-weight:900;margin-bottom:5px}
  .auth .sub{text-align:center;color:var(--muted);font-size:13px;margin-bottom:24px}
  .auth .field{margin-bottom:14px}
  .auth label{display:block;font-size:12px;color:var(--muted);font-weight:700;margin-bottom:7px}
  .auth input{width:100%;background:var(--raised);border:1px solid var(--line2);border-radius:11px;color:var(--txt);padding:12px 14px;outline:none;transition:.13s}
  .auth input:focus{border-color:var(--brand)}
  .auth .go{width:100%;height:46px;border-radius:11px;background:var(--brand);color:#fff;font-weight:800;font-size:15px;margin-top:8px;transition:.13s}
  .auth .go:hover{filter:brightness(1.12)}
  .auth .go:disabled{opacity:.6;cursor:default}
  .auth .switch{text-align:center;margin-top:18px;color:var(--muted);font-size:13px}
  .auth .switch b{color:var(--brand);cursor:pointer;font-weight:800}
  .auth .err{background:var(--danger-dim);border:1px solid #f2c5c5;color:#b22b2b;border-radius:10px;padding:10px 12px;font-size:12.5px;margin-bottom:14px;display:none}
  .auth .err.show{display:block}

  /* ---------- Top bar ---------- */
  .topbar{display:flex;align-items:center;gap:16px;padding:14px 22px;border-bottom:1px solid #2C3D5E;background:var(--brand);position:sticky;top:0;z-index:40}
  .topbar .brand h1{color:#fff}
  .topbar .brand .sub{color:#A9B6D0}
  .topbar .search{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.18)}
  .topbar .search input{color:#fff}
  .topbar .search input::placeholder{color:#9FB0CE}
  .topbar .btn.ghost{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2);color:#fff}
  .topbar .btn.ghost:hover{background:rgba(255,255,255,.18)}
  .topbar .btn.primary{background:#fff;color:var(--brand)}
  .topbar .btn.primary:hover{filter:brightness(.96)}
  .brand{display:flex;align-items:center;gap:12px}
  .brand .logo{height:40px;width:auto;flex:none;display:flex;align-items:center}
  .brand .logo img{height:40px;width:auto;object-fit:contain}
  .brand h1{font-size:18px;font-weight:900;letter-spacing:-.3px;line-height:1}
  .brand .sub{font-size:11.5px;color:var(--muted);margin-top:3px}
  .spacer{flex:1}
  .search{display:flex;align-items:center;gap:8px;background:var(--raised);border:1px solid var(--line);border-radius:10px;padding:0 12px;height:40px;min-width:200px}
  .search input{background:none;border:none;color:var(--txt);width:100%;outline:none}
  .search input::placeholder{color:var(--faint)}
  .btn{height:40px;padding:0 16px;border-radius:10px;font-weight:700;font-size:13.5px;display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:var(--raised);transition:.15s}
  .btn:hover{border-color:var(--line2);background:var(--raised2)}
  .btn.primary{background:var(--brand);color:#fff;border:none;box-shadow:0 4px 14px rgba(27,42,74,.22)}
  .btn.primary:hover{filter:brightness(1.12)}
  .btn.ghost{background:none;border-color:var(--line)}

  .shell{display:flex;min-height:calc(100vh - 71px)}
  .side{width:248px;flex:none;border-left:1px solid #24344F;padding:20px 16px;display:flex;flex-direction:column;gap:6px;background:var(--brand)}
  .side .nav-group-label{color:#7E8DAC}
  .side .nav-item{color:#B7C2DA}
  .side .nav-item:hover{background:rgba(255,255,255,.08);color:#fff}
  .side .nav-item.active{background:rgba(255,255,255,.14);color:#fff}
  .side .nav-item .count{background:rgba(255,255,255,.14);color:#D5DEEE}
  .side .tnav-link{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.16);color:#B7C2DA}
  .side .tnav-link:hover{background:rgba(255,255,255,.16);border-color:rgba(255,255,255,.3);color:#fff}
  .side .me-card{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.14)}
  .side .me-card #meName{color:#fff!important}
  .side .me-card #meRole{color:#9FB0CE!important}
  .side .me-card .out{color:#9FB0CE}
  .side .me-card .out:hover{color:#FF9B9B}
  .nav-group-label{font-size:10.5px;color:var(--faint);font-weight:700;letter-spacing:.6px;margin:14px 8px 6px}
  .nav-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;color:var(--muted);font-weight:700;transition:.13s;width:100%;text-align:right}
  .nav-item .ico{width:18px;text-align:center;font-size:15px}
  .nav-item:hover{background:var(--raised);color:var(--txt)}
  .nav-item.active{background:var(--brand-dim);color:var(--brand)}
  .nav-item .count{margin-inline-start:auto;font-size:11px;background:var(--raised2);color:var(--muted);border-radius:20px;padding:1px 8px}
  .me-card{margin-top:auto;background:var(--raised);border:1px solid var(--line);border-radius:12px;padding:12px;display:flex;gap:10px;align-items:center}
  .me-card .out{margin-inline-start:auto;font-size:11px;color:var(--faint);cursor:pointer}
  .me-card .out:hover{color:var(--danger)}

  .main{flex:1;padding:24px 28px;overflow:auto;min-width:0}
  .page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:20px;flex-wrap:wrap}
  .page-title{font-size:24px;font-weight:900;letter-spacing:-.5px}
  .page-sub{color:var(--muted);font-size:13px;margin-top:3px}

  .stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:22px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px}
  .stat .k{font-size:11.5px;color:var(--muted);font-weight:700;display:flex;align-items:center;gap:7px}
  .stat .v{font-size:30px;font-weight:900;margin-top:6px;line-height:1}
  .stat .bar{height:4px;border-radius:4px;background:var(--raised2);margin-top:12px;overflow:hidden}
  .stat .bar>i{display:block;height:100%;border-radius:4px}
  .dot{width:8px;height:8px;border-radius:50%;flex:none}

  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;align-items:center}
  .chip{padding:7px 13px;border-radius:20px;border:1px solid var(--line);background:var(--panel);color:var(--muted);font-weight:700;font-size:12.5px;transition:.13s}
  .chip:hover{border-color:var(--line2);color:var(--txt)}
  .chip.on{background:var(--brand);color:#fff;border-color:var(--brand)}
  .filters .sep{width:1px;height:22px;background:var(--line);margin:0 4px}

  .board{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;align-items:start}
  .col{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:12px;min-height:120px;transition:.13s}
  .col.drop{outline:2px dashed var(--brand);outline-offset:-4px;background:#1b1d22}
  .col-head{display:flex;align-items:center;gap:9px;padding:4px 6px 12px;font-weight:800;font-size:13px}
  .col-head .num{margin-inline-start:auto;background:var(--raised2);color:var(--muted);border-radius:20px;padding:1px 9px;font-size:11px}
  .card{background:var(--raised);border:1px solid var(--line2);border-radius:var(--radius-s);padding:12px;margin-bottom:10px;cursor:grab;transition:.13s;position:relative}
  .card:hover{border-color:var(--brand);transform:translateY(-1px);box-shadow:var(--shadow)}
  .card.dragging{opacity:.4}
  .card .ttl{font-weight:700;font-size:14px;line-height:1.4;margin-bottom:9px}
  .card .meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .tag{font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:6px;display:inline-flex;align-items:center;gap:5px}
  .tag.cat{background:var(--raised2);color:var(--txt)}
  .tag.plat{background:var(--raised2);color:var(--muted)}
  .card .foot{display:flex;align-items:center;gap:8px;margin-top:11px;padding-top:10px;border-top:1px solid var(--line)}
  .ava{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;font-size:11px;font-weight:800;color:#0E1014;flex:none}
  .who{font-size:11.5px;color:var(--muted);font-weight:700}
  .due{margin-inline-start:auto;font-size:11px;color:var(--muted);font-weight:700;display:flex;align-items:center;gap:4px}
  .due.late{color:var(--danger)}
  .teacher-pill{font-size:10.5px;color:var(--brand);font-weight:700;margin-bottom:7px;display:flex;align-items:center;gap:5px}

  .grid3{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
  .member{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px}
  .member .top{display:flex;align-items:center;gap:12px;margin-bottom:16px}
  .member .name{font-weight:800;font-size:16px}
  .member .role{font-size:11.5px;color:var(--muted)}
  .kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
  .kpi{background:var(--raised);border:1px solid var(--line);border-radius:10px;padding:10px;text-align:center}
  .kpi .n{font-size:22px;font-weight:900}
  .kpi .l{font-size:10.5px;color:var(--muted);font-weight:700;margin-top:2px}
  .wl{margin-top:6px}
  .wl .lbl{display:flex;justify-content:space-between;font-size:11.5px;color:var(--muted);font-weight:700;margin-bottom:6px}
  .wl .track{height:8px;background:var(--raised2);border-radius:6px;overflow:hidden;display:flex}
  .wl .track i{height:100%}
  .teach-list{display:flex;gap:6px;flex-wrap:wrap;margin-top:14px}
  .teach-list .t{font-size:11px;background:var(--raised);border:1px solid var(--line);border-radius:7px;padding:4px 9px;color:var(--muted);font-weight:700}
  .role-badge{font-size:10px;font-weight:800;padding:2px 8px;border-radius:6px;background:var(--brand-dim);color:var(--brand);cursor:pointer}

  /* teacher nav row with link button */
  .tnav-row{display:flex;align-items:center;gap:4px}
  .tnav-row .nav-item{flex:1}
  .tnav-link{width:30px;height:30px;flex:none;border-radius:8px;display:grid;place-items:center;color:var(--muted);border:1px solid var(--line);background:var(--panel);font-size:13px}
  .tnav-link:hover{color:var(--brand);border-color:var(--brand);background:var(--brand-dim)}

  /* link tree */
  .lt-wrap{max-width:560px}
  .lt-card{display:flex;align-items:center;gap:14px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;margin-bottom:12px;text-decoration:none;color:var(--txt);transition:.14s}
  .lt-card:hover{border-color:var(--brand);transform:translateY(-1px);box-shadow:var(--shadow)}
  .lt-ico{width:46px;height:46px;border-radius:12px;flex:none;display:grid;place-items:center;font-size:20px;color:#fff}
  .lt-card .nm{font-weight:800;font-size:15px}
  .lt-card .sub{font-size:11.5px;color:var(--muted);margin-top:2px}
  .lt-card .arr{margin-inline-start:auto;color:var(--faint);font-size:20px}
  .lt-empty{background:var(--panel);border:1px dashed var(--line2);border-radius:var(--radius);padding:18px;color:var(--muted);text-align:center;font-size:13px;margin-bottom:12px}

  /* leaderboard + tracking */
  .miss-badge{font-size:10px;font-weight:800;padding:1px 7px;border-radius:20px;background:var(--danger-dim);color:var(--danger);margin-inline-start:6px}
  .rank-row{display:flex;align-items:center;gap:14px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px 18px;margin-bottom:10px}
  .rank-row.top{border-color:var(--brand);box-shadow:var(--shadow)}
  .rank-pos{width:38px;height:38px;flex:none;border-radius:10px;display:grid;place-items:center;font-weight:900;font-size:16px;background:var(--raised2);color:var(--muted)}
  .rank-pos.g1{background:#FFE9B0;color:#8a6a12}.rank-pos.g2{background:#E3E8EF;color:#5a6573}.rank-pos.g3{background:#F4D9C2;color:#8a5a30}
  .rank-main{flex:1;min-width:0}
  .rank-main .nm{font-weight:800;font-size:15px}
  .rank-main .sub{font-size:11.5px;color:var(--muted);margin-top:3px;display:flex;gap:12px;flex-wrap:wrap}
  .rank-score{text-align:center;flex:none}
  .rank-score .n{font-size:26px;font-weight:900;line-height:1}
  .rank-score .l{font-size:10px;color:var(--muted);font-weight:700}
  .seg-tabs{display:inline-flex;background:var(--raised);border:1px solid var(--line2);border-radius:10px;padding:3px;gap:3px;margin-bottom:18px}
  .seg-tabs button{padding:8px 16px;border-radius:8px;font-weight:700;font-size:13px;color:var(--muted)}
  .seg-tabs button.on{background:var(--brand);color:#fff}
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:12px;max-width:280px}
  .cal .d{aspect-ratio:1;border-radius:6px;display:grid;place-items:center;font-size:10px;font-weight:700}
  .cal .d.ok{background:#DDF3E6;color:#1d8a52}
  .cal .d.miss{background:var(--danger-dim);color:var(--danger)}
  .cal .d.rest{background:var(--raised2);color:var(--faint)}
  .cal .d.future{background:transparent;color:var(--faint)}

  .feed{max-width:780px}
  .empty{text-align:center;color:var(--muted);padding:60px 20px}
  .empty .big{font-size:40px;margin-bottom:12px;opacity:.5}
  .report{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:22px;max-width:780px}
  .report h3{font-size:16px;margin-bottom:14px}
  .rrow{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--line)}
  .rrow:last-child{border:none}.rrow .v{font-weight:800}

  .overlay{position:fixed;inset:0;background:rgba(5,6,8,.7);backdrop-filter:blur(4px);z-index:90;display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow:auto}
  .overlay.show{display:flex}
  .modal{background:var(--panel);border:1px solid var(--line2);border-radius:18px;width:560px;max-width:100%;box-shadow:var(--shadow);overflow:hidden}
  .modal .mh{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--line)}
  .modal .mh h3{font-size:17px;font-weight:900}
  .modal .mb{padding:22px;display:flex;flex-direction:column;gap:16px}
  .field label{display:block;font-size:12px;color:var(--muted);font-weight:700;margin-bottom:7px}
  .field input,.field select,.field textarea{width:100%;background:var(--raised);border:1px solid var(--line2);border-radius:10px;color:var(--txt);padding:11px 13px;outline:none;transition:.13s}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--brand)}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .mf{display:flex;gap:10px;padding:16px 22px;border-top:1px solid var(--line)}
  .x{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;color:var(--muted);font-size:18px;border:1px solid var(--line)}
  .x:hover{background:var(--raised2);color:var(--txt)}
  .seg{display:flex;background:var(--raised);border:1px solid var(--line2);border-radius:10px;padding:3px;gap:3px}
  .seg button{flex:1;padding:9px;border-radius:8px;font-weight:700;font-size:12.5px;color:var(--muted);transition:.13s}
  .seg button.on{background:var(--raised2);color:var(--txt)}
  .comments{display:flex;flex-direction:column;gap:10px;max-height:170px;overflow:auto}
  .cmt{background:var(--raised);border:1px solid var(--line);border-radius:10px;padding:10px 12px}
  .cmt .h{display:flex;gap:8px;align-items:center;margin-bottom:5px}.cmt .h b{font-size:12.5px}.cmt .h span{font-size:10.5px;color:var(--faint);margin-inline-start:auto}
  .danger-link{color:var(--danger);font-weight:700;font-size:12.5px}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ready);color:#04150c;font-weight:800;padding:12px 22px;border-radius:12px;z-index:120;opacity:0;transition:.25s;box-shadow:var(--shadow)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.bad{background:var(--danger);color:#fff}
  .hidden{display:none!important}
  .loader{min-height:100vh;display:grid;place-items:center;color:var(--muted)}
  .spin{width:34px;height:34px;border:3px solid var(--line2);border-top-color:var(--brand);border-radius:50%;animation:sp 1s linear infinite;margin:0 auto 14px}
  @keyframes sp{to{transform:rotate(360deg)}}

  .menu-btn{display:none;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;width:42px;height:42px;border-radius:10px;font-size:20px;flex:none;cursor:pointer}
  .ico-m{display:none}
  .scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:45}
  .scrim.show{display:block}
  @media(max-width:1080px){.stats{grid-template-columns:repeat(2,1fr)}.board{grid-template-columns:1fr 1fr}}
  @media(max-width:720px){
    .board{grid-template-columns:1fr}.two{grid-template-columns:1fr}
    .menu-btn{display:flex;align-items:center;justify-content:center}
    .topbar{padding:10px 14px;gap:10px}
    .topbar-search{display:none}
    .brand .sub{display:none}
    .brand h1{font-size:16px}
    .brand .logo,.brand .logo img{height:32px}
    .btn .lbl{display:none}
    .btn .ico-m{display:inline}
    .topbar .btn{padding:0 12px;height:42px}
    /* الدرج الجانبي */
    .side{position:fixed;top:0;right:0;height:100vh;width:270px;max-width:84vw;z-index:50;
      transform:translateX(100%);transition:transform .25s ease;overflow-y:auto;box-shadow:-8px 0 30px rgba(0,0,0,.3)}
    .side.open{transform:translateX(0)}
    .main{padding:16px 14px}
    .page-title{font-size:20px}
    .grid3{grid-template-columns:1fr}
    .stats{grid-template-columns:repeat(2,1fr);gap:9px}
    .stat .v{font-size:24px}
    .cal{max-width:100%}
    .rank-row{padding:12px 14px;gap:10px}
    .seg-tabs{width:100%;overflow-x:auto}
    .modal{width:96vw}
  }
  @media(max-width:380px){.stats{grid-template-columns:1fr 1fr}.topbar .btn.ghost{display:none}}
</style>
</head>
<body>

<div id="loading" class="loader"><div style="text-align:center"><div class="spin"></div>بنحمّل…</div></div>

<!-- AUTH -->
<div id="authScreen" class="auth-wrap hidden">
  <div class="auth">
    <div class="logo"><img src="logo.png" alt="A to Z"></div>
    <h1 id="authTitle">تسجيل الدخول</h1>
    <div class="sub" id="authSub">ادخل على بورد المحتوى</div>
    <div class="err" id="authErr"></div>
    <div class="field" id="nameField" style="display:none">

/* ---------- متابعة النشر اليومي + التقييم ---------- */
function monthStart(){const d=new Date();return new Date(d.getFullYear(),d.getMonth(),1);}
function ymd(d){const z=new Date(d.getTime()-d.getTimezoneOffset()*60000);return z.toISOString().slice(0,10);}
// الأيام المطلوب فيها نشر للمدرّس — من تاريخ الإسناد أو أول الشهر (الأحدث) لحد إمبارح
function expectedDays(teacher){
  const rest = (teacher.rest_day==null?5:teacher.rest_day);
  const days=[]; const today=new Date(); today.setHours(0,0,0,0);
  // نبدأ من الأحدث بين: أول الشهر، وتاريخ إسناد المدرّس للموظف
  let start=new Date(monthStart());
  if(teacher.assigned_at){
    const a=new Date(teacher.assigned_at+'T00:00:00');
    if(a>start) start=a;
  }
  let d=new Date(start);
  while(d < today){
    if(d.getDay()!==rest) days.push(ymd(d));
    d=new Date(d); d.setDate(d.getDate()+1);
  }
  return days;
}
// أيام نزل فيها فعلاً نشر للمدرّس (من السجل، الشهر الحالي)
function publishedDays(teacherId){
  const ms=ymd(monthStart());
  return new Set(PUBLOG.filter(l=>l.teacher_id===teacherId && l.pub_date>=ms).map(l=>l.pub_date));
}
// الأيام الفايتة لمدرّس (مطلوبة وما نزلش فيها)
function missedDaysForTeacher(teacherId){
  const t=T(teacherId); if(!t||!t.id) return [];
  const done=publishedDays(teacherId);
  return expectedDays(t).filter(d=>!done.has(d));
}
// إجمالي بوستات الشهر لمدرّس
function teacherPosts(teacherId){
  const ms=ymd(monthStart());
  return PUBLOG.filter(l=>l.teacher_id===teacherId && l.pub_date>=ms).length;
}
// إجمالي بوستات العضو الشهر (كل مدرّسينه)
function memberPosts(memberId){
  const ms=ymd(monthStart());
  return PUBLOG.filter(l=>l.member_id===memberId && l.pub_date>=ms).length;
}
// إجمالي الأيام الفايتة عبر كل مدرّسين العضو
function memberMissed(memberId){
  return TEACHERS.filter(t=>t.owner_id===memberId).reduce((s,t)=>s+missedDaysForTeacher(t.id).length,0);
}
function memberTeacherBreakdown(memberId){
  return TEACHERS.filter(t=>t.owner_id===memberId).map(t=>({t, posts:teacherPosts(t.id), missed:missedDaysForTeacher(t.id).length}));
}
// نقطة تقييم العضو (الشهر) — ميعاد40 إنتاجية30 جودة20 خصم10
function memberScore(memberId){
  const ms=ymd(monthStart());
  const cards=CARDS.filter(c=>c.assignee_id===memberId && (c.kind||'post')==='post');
  const published=cards.filter(c=>c.status==='published');
  const expectedTotal=TEACHERS.filter(t=>t.owner_id===memberId).reduce((s,t)=>s+expectedDays(t).length,0);
  const posts=memberPosts(memberId);
  const missed=memberMissed(memberId);
  // عضو جديد / لسه مفيش بيانات كافية
  if(expectedTotal<3 && posts<3) return {score:null, posts, missed, onTimeRate:null, returns:0};
  // الميعاد: نسبة أيام النشر المنفّذة من المطلوبة
  const onTimeRate = expectedTotal? Math.max(0,Math.min(1,(expectedTotal-missed)/expectedTotal)) : 1;
  // الإنتاجية: بوستات منفّذة مقارنة بالمتوقّع (سقف 100%)
  const productivity = expectedTotal? Math.min(1, posts/expectedTotal) : (posts>0?1:0);
  // الجودة: نسبة اللي عدّى من غير ما يترجّع (نحسب الرجوعات من التعليقات اللي فيها ↩)
  const returns = COMMENTS.filter(cm=>cm.text&&cm.text.startsWith('↩') && cards.some(c=>c.id===cm.card_id)).length;
  const handled = published.length + returns;
  const quality = handled? Math.max(0,(published.length)/handled) : 1;
  // خصم المتأخرات: كل متأخر بيخصم
  const lateCount = cards.filter(isLate).length;
  const penalty = Math.min(1, lateCount*0.1);
  const score = Math.round((onTimeRate*40 + productivity*30 + quality*20 + (1-penalty)*10));
  return {score, posts, missed, onTimeRate:Math.round(onTimeRate*100), returns, productivity:Math.round(productivity*100)};
}
// تسجيل نشر في السجل (مرة واحدة لكل كارت في اليوم)
async function recordPublish(card){
  if(!card.teacher_id) return;

function dueLabel(d){if(!d)return'—';const days=Math.round((new Date(d+'T00:00:00')-new Date(ymd(new Date())+'T00:00:00'))/864e5);
  if(days===0)return'النهاردة';if(days<0)return'متأخر '+(-days)+'ي';if(days===1)return'بكرة';return'بعد '+days+'ي';}
function roleLabel(r){return r==='admin'?'أدمن':r==='manager'?'أكونت مانجر':r==='lead'?'تيم ليدر':'عضو';}

// كل الـ IDs اللي تحتي في الشجرة (بأي عمق) — مش بياخد نفسي
function descendantIds(){
  const out=new Set(); let frontier=[ME.id];
  while(frontier.length){
    const next=[];
    PROFILES.forEach(p=>{ if(p.lead_id && frontier.includes(p.lead_id) && !out.has(p.id)){ out.add(p.id); next.push(p.id);} });
    frontier=next;
  }
  return [...out];
}
function myMembers(){ // member ids visible to me (للتقييم والليدر بورد) — بدون الموقوفين
  if(ME.role==='admin')return PROFILES.filter(p=>p.role==='member'&&p.active!==false).map(p=>p.id);

// كل الناس اللي ممكن يمسكوا مدرّسين/كروت في نطاقي (أي دور)
function scopeIds(){
  if(ME.role==='admin') return PROFILES.map(p=>p.id);

  return [ME.id, ...descendantIds()];

function statStrip(cs){
  const isTask=boardKind==='task';
  const total=cs.length,by=id=>cs.filter(c=>c.status===id).length;
  const done=isTask?by('done'):(by('ready')+by('published'));

  const S=(k,v,c,e='')=>`<div class="stat"><div class="k"><span class="dot" style="background:${c}"></span>${k}</div><div class="v">${v}</div>${e}</div>`;
  if(isTask) return `<div class="stats">${S('إجمالي التاسكات',total,'var(--brand)',`<div class="bar"><i style="width:${pct}%;background:var(--ready)"></i></div>`)}

    ${S('خلص',by('done'),'var(--ready)')}${S('متأخر',late,late?'var(--danger)':'var(--faint)')}</div>`;
  return `<div class="stats">${S('إجمالي المحتوى',total,'var(--brand)',`<div class="bar"><i style="width:${pct}%;background:var(--ready)"></i></div>`)}
    ${S('قيد العمل',by('doing'),'var(--doing)')}${S('محتاج مراجعة',by('review'),'var(--review)')}

}

function wireBoard(){
  document.querySelectorAll('.card').forEach(el=>{
    el.addEventListener('click',()=>openCard(el.dataset.id));
    el.addEventListener('dragstart',e=>{e.dataTransfer.setData('id',el.dataset.id);el.classList.add('dragging');});
    el.addEventListener('dragend',()=>el.classList.remove('dragging'));
  });
  document.querySelectorAll('.col').forEach(col=>{
    col.addEventListener('dragover',e=>{e.preventDefault();col.classList.add('drop');});
    col.addEventListener('dragleave',()=>col.classList.remove('drop'));
    col.addEventListener('drop',async e=>{e.preventDefault();col.classList.remove('drop');
      const id=e.dataTransfer.getData('id'),ns=col.dataset.status,c=CARDS.find(x=>x.id===id);if(!c)return;
      const kind=c.kind||'post';
      if(kind==='task'){
        // العضو يحرّك لـ «بيتعمل» بس؛ «خلص» للقائد
        if(ns==='done' && ME.role==='member' && c.assignee_id===ME.id){toast('التيم ليدر هو اللي يأكّد إنها خلصت',true);return;}
        if(c.status!==ns){c.status=ns;render();await sb.from('cards').update({status:ns}).eq('id',id);}
        return;
      }
      if(ME.role==='member'&&(ns==='ready'||ns==='published')&&c.status!=='ready'){toast('الأعضاء بيحوّلوا لـ «محتاج مراجعة» والتيم ليدر يوافق',true);return;}
      if(c.status!==ns){const wasPub=c.status==='published';c.status=ns;render();await sb.from('cards').update({status:ns}).eq('id',id);if(ns==='published'&&!wasPub){await recordPublish(c);await reload();render();}}
    });
  });
  document.querySelectorAll('[data-cat]').forEach(b=>b.onclick=()=>{filterCat=b.dataset.cat||null;render();});
}

let agendaScope='me';
function agendaView(){
  const canTeam = ME.role!=='member';
  const ids = (agendaScope==='team'&&canTeam) ? scopeIds() : [ME.id];
  // المهام النشطة (مش الخلصانة) المسندة للأشخاص دول
  let items=CARDS.filter(c=>ids.includes(c.assignee_id));
  items=items.filter(c=>(c.kind==='task')?c.status!=='done':c.status!=='published');
  const today=new Date(); today.setHours(0,0,0,0);
  const tomorrow=new Date(today); tomorrow.setDate(today.getDate()+1);
  const weekEnd=new Date(today); weekEnd.setDate(today.getDate()+7);
  const ymdT=ymd(today), ymdTom=ymd(tomorrow);
  const buckets={late:[],today:[],tom:[],week:[],later:[],none:[]};
  items.forEach(c=>{
    if(!c.due){buckets.none.push(c);return;}
    if(c.due<ymdT)buckets.late.push(c);
    else if(c.due===ymdT)buckets.today.push(c);
    else if(c.due===ymdTom)buckets.tom.push(c);
    else if(c.due<=ymd(weekEnd))buckets.week.push(c);
    else buckets.later.push(c);
  });
  const sortf=(a,b)=>(a.due||'9').localeCompare(b.due||'9');
  Object.values(buckets).forEach(arr=>arr.sort(sortf));
  const row=c=>{
    const a=U(c.assignee_id), isTask=c.kind==='task', t=isTask?null:T(c.teacher_id);
    const stName=(isTask?TASK_STATUSES:STATUSES).find(s=>s.id===c.status)?.name||'';
    return `<div class="rank-row" style="cursor:pointer;padding:11px 16px" onclick="openCard('${c.id}')">
      <span style="font-size:18px;flex:none">${isTask?'✅':'📱'}</span>
      <div class="rank-main"><div class="nm" style="font-size:14px">${esc(c.title)}</div>
        <div class="sub">${t?`<span>● ${t.name}</span>`:''}<span>👤 ${a.name}</span><span>${stName}</span></div></div>
      ${c.due?`<span class="due ${isLate(c)?'late':''}" style="flex:none">${isLate(c)?'⚠':'◔'} ${dueLabel(c.due)}</span>`:'<span style="color:var(--faint);font-size:11px">بدون ميعاد</span>'}</div>`;
  };
  const section=(title,arr,color,urgent)=>arr.length?`<div class="nav-group-label" style="color:${color||'var(--muted)'};margin:18px 4px 10px;font-size:13px;font-weight:800">${title} (${arr.length})</div>${arr.map(row).join('')}`:'';
  const toggle = canTeam?`<div class="seg-tabs" style="margin-bottom:18px">
      <button class="${agendaScope==='me'?'on':''}" onclick="agendaScope='me';render()">شغلي أنا</button>
      <button class="${agendaScope==='team'?'on':''}" onclick="agendaScope='team';render()">شغل الفريق</button></div>`:'';
  let body=section('⚠ متأخر',buckets.late,'var(--danger)')+section('النهارده',buckets.today,'var(--brand)')
    +section('بكرة',buckets.tom)+section('الأسبوع ده',buckets.week)+section('لاحقًا',buckets.later)+section('من غير ميعاد',buckets.none);
  if(!body) body=`<div class="empty"><div class="big">📅</div>مفيش شغل مفتوح${agendaScope==='team'?' للفريق':''} حاليًا. كله متسلّم 👏</div>`;
  return `<div class="page-head"><div><div class="page-title">الأجندة</div><div class="page-sub">شغلك مرتّب بالأيام — النهارده، بكرة، وبعدين</div></div></div>${toggle}${body}`;
}

function teamGroupsHTML(){
  let scope = (ME.role==='admin' ? PROFILES.filter(p=>p.id!==ME.id) : PROFILES.filter(p=>descendantIds().includes(p.id))).filter(p=>p.active!==false);
  if(qTeam.trim()){const q=qTeam.trim();scope=scope.filter(p=>p.name.includes(q));}
  const managers=scope.filter(p=>p.role==='manager');
  const leads=scope.filter(p=>p.role==='lead');
  const members=scope.filter(p=>p.role==='member');
  let body='';
  if(managers.length) body+=`<div class="nav-group-label" style="color:var(--muted);margin:6px 4px 10px;font-size:13px">أكونت مانجرز (${managers.length})</div><div class="grid3">${managers.map(m=>leaderCardHTML(m.id,'manager')).join('')}</div>`;
  if(leads.length) body+=`<div class="nav-group-label" style="color:var(--muted);margin:18px 4px 10px;font-size:13px">تيم ليدرز (${leads.length})</div><div class="grid3">${leads.map(l=>leaderCardHTML(l.id,'lead')).join('')}</div>`;
  if(members.length) body+=`<div class="nav-group-label" style="color:var(--muted);margin:18px 4px 10px;font-size:13px">أعضاء (${members.length})</div><div class="grid3">${members.map(m=>memberCardHTML(m.id)).join('')}</div>`;
  if(!body) body=`<div class="empty"><div class="big">⚑</div>${qTeam?'مفيش حد بالاسم ده':'لسه مفيش حد في فريقك'}.</div>`;
  return body;
}
function descendantsOf(rootId){
  const out=new Set(); let frontier=[rootId];
  while(frontier.length){const next=[];PROFILES.forEach(p=>{if(p.lead_id&&frontier.includes(p.lead_id)&&!out.has(p.id)){out.add(p.id);next.push(p.id);}});frontier=next;}
  return [...out];
}

function membersRank(){
  const ids=myMembers();
  if(ids.length===0) return `<div class="empty"><div class="big">★</div>لسه مفيش أعضاء بشغل. أول ما يبدأوا ينزّلوا محتوى هيظهر ترتيبهم هنا.</div>`;
  const rows=ids.map(id=>({id,...memberScore(id)})).sort((a,b)=>(b.score??-1)-(a.score??-1));
  let pos=0;
  return rows.map(r=>{
    const u=U(r.id); pos++;
    const isNew=r.score===null;
    const medal=pos===1?'g1':pos===2?'g2':pos===3?'g3':'';
    return `<div class="rank-row ${pos<=3&&!isNew?'top':''}">
      <div class="rank-pos ${isNew?'':medal}">${isNew?'—':pos}</div>
      <span class="ava" style="width:38px;height:38px;font-size:14px;background:${avaColor(r.id)}">${initials(u.name)}</span>
      <div class="rank-main"><div class="nm">${u.name}</div>

          <span style="color:${r.missed?'var(--danger)':'inherit'}">${r.missed?'⚠ فوّت '+r.missed+' يوم':'✓ ملتزم'}</span>
          ${r.onTimeRate!=null?`<span>⏱ التزام ${r.onTimeRate}٪</span>`:''}
          ${r.returns?`<span>↩ رجع ${r.returns}</span>`:''}
        </div></div>
      <div class="rank-score"><div class="n" style="color:${isNew?'var(--faint)':scoreColor(r.score)}">${isNew?'—':r.score}</div><div class="l">${isNew?'لسه بيتقيّم':'من ١٠٠'}</div></div>
    </div>`;
  }).join('');
}
function scoreColor(s){return s>=80?'var(--ready)':s>=55?'var(--doing)':'var(--danger)';}
function teachersTracking(){
  const ids=scopeIds();
  const ts=TEACHERS.filter(t=>ids.includes(t.owner_id));
  if(ts.length===0) return `<div class="empty"><div class="big">📅</div>مفيش مدرّسين لسه.</div>`;
  return `<div class="grid3">${ts.map(t=>{
    const posts=teacherPosts(t.id), missed=missedDaysForTeacher(t.id).length, owner=U(t.owner_id);
    const restName=['الأحد','الاتنين','التلات','الأربع','الخميس','الجمعة','السبت'][t.rest_day==null?5:t.rest_day];
    return `<div class="member">
      <div class="top"><span class="ava" style="width:38px;height:38px;font-size:13px;background:${avaColor(t.id)}">${initials(t.name)}</span>
        <div><div class="name">${t.name}</div><div class="role">المسؤول: ${owner.name} · راحة: ${restName}</div></div></div>
      <div class="kpi-row">
        <div class="kpi"><div class="n">${posts}</div><div class="l">بوست الشهر</div></div>
        <div class="kpi"><div class="n" style="color:${missed?'var(--danger)':'var(--ready)'}">${missed}</div><div class="l">يوم فايت</div></div>
      </div>
      ${miniCalendar(t)}
    </div>`;
  }).join('')}</div>`;

function miniCalendar(t){
  const rest=(t.rest_day==null?5:t.rest_day);
  const done=publishedDays(t.id);
  const today=new Date(); today.setHours(0,0,0,0);
  const ms=monthStart();
  const canBackdate = ME.role!=='member'; // التيم ليدر/الأكونت مانجر/الأدمن يقدروا يسجّلوا نشر فايت
  const assigned = t.assigned_at ? new Date(t.assigned_at+'T00:00:00') : null;
  const dayLabels=['ح','ن','ث','ر','خ','ج','س'];
  let cells=dayLabels.map(l=>`<div class="d" style="background:none;color:var(--faint)">${l}</div>`).join('');
  for(let i=0;i<ms.getDay();i++) cells+='<div class="d future"></div>';
  let d=new Date(ms); const monthIdx=ms.getMonth();
  while(d.getMonth()===monthIdx){
    const ds=ymd(d); const num=d.getDate();
    let cls, click='';
    if(d>=today) cls='future';
    else if(assigned && d<assigned) cls='future'; // قبل ما المدرّس يتسند — مش محسوب
    else if(d.getDay()===rest) cls='rest';
    else if(done.has(ds)) cls='ok';
    else { cls='miss'; if(canBackdate){ click=`onclick="recordBackdate('${t.id}','${ds}')" style="cursor:pointer" title="سجّل نشر في اليوم ده"`; } }
    cells+=`<div class="d ${cls}" ${click}>${num}</div>`;
    d=new Date(d); d.setDate(d.getDate()+1);
  }
  return `<div class="cal">${cells}</div>${canBackdate?'<div style="font-size:10.5px;color:var(--faint);margin-top:6px">دوس على يوم أحمر تسجّل فيه نشر فايت</div>':''}`;
}
window.recordBackdate=async function(tid,date){
  const t=T(tid);
  if(!confirm(`تسجّل إن «${t.name}» نزل بوست يوم ${date}؟`))return;
  const {error}=await sb.from('publish_log').insert({card_id:null,teacher_id:tid,member_id:t.owner_id,pub_date:date});
  if(error)return toast(error.message,true);
  await reload();render();toast('اتسجّل النشر');
};

/* ---------- management view (admin/manager/lead) ---------- */
function manageView(){
  // who can I manage: admin = everyone; others = my descendants
  let people = ME.role==='admin' ? PROFILES.filter(p=>p.id!==ME.id) : PROFILES.filter(p=>descendantIds().includes(p.id));
  people = people.slice().sort((a,b)=>roleRank(b.role)-roleRank(a.role));
  const groups=[
    ['managers','أكونت مانجرز','manager'],
    ['leads','تيم ليدرز','lead'],
    ['members','أعضاء','member'],
  ];
  const head=`<div class="page-head"><div><div class="page-title">إدارة الفريق</div>
    <div class="page-sub">رقّي الناس وحدد كل واحد تابع لمين · إجمالي ${people.length} شخص</div></div></div>`;
  if(people.length===0) return head+`<div class="empty"><div class="big">⚙</div>لسه محدش سجّل غيرك. ابعت لينك السايت لفريقك، وأول ما يعملوا حساب هيظهروا هنا تقدر ترقّيهم وتوزّعهم.</div>`;
  const card=p=>{
    const roleOpts=[['member','عضو'],['lead','تيم ليدر'],['manager','أكونت مانجر']]
      .concat(ME.role==='admin'?[['admin','أدمن']]:[])
      .map(([v,l])=>`<option value="${v}" ${p.role===v?'selected':''}>${l}</option>`).join('');
    // parent options depend on the role: member→leads, lead→managers, manager→(admin, none)
    let parentSel='';
    if(p.role==='member'){
      const leads=PROFILES.filter(x=>x.role==='lead');
      parentSel=`<select onchange="setParent('${p.id}',this.value)"><option value="">— اختار التيم ليدر —</option>${leads.map(l=>`<option value="${l.id}" ${p.lead_id===l.id?'selected':''}>${l.name}</option>`).join('')}</select>`;
    } else if(p.role==='lead'){
      const mgrs=PROFILES.filter(x=>x.role==='manager');
      parentSel=`<select onchange="setParent('${p.id}',this.value)"><option value="">— اختار الأكونت مانجر —</option>${mgrs.map(m=>`<option value="${m.id}" ${p.lead_id===m.id?'selected':''}>${m.name}</option>`).join('')}</select>`;
    } else {
      parentSel=`<span style="color:var(--faint);font-size:12px">تابع للأدمن مباشرة</span>`;
    }
    const parentLabel = p.role==='member'?'التيم ليدر':p.role==='lead'?'الأكونت مانجر':'';
    const suspended = p.active===false;
    const canManage = ME.role==='admin' || (ME.role==='manager' && descendantIds().includes(p.id));
    const actions = canManage ? `<div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">
        <button class="btn ghost" style="flex:1;height:34px;font-size:12.5px" onclick="renameMember('${p.id}')">✎ تعديل الاسم</button>
        <button class="btn ghost" style="flex:1;height:34px;font-size:12.5px" onclick="toggleActive('${p.id}')">${suspended?'▶ تفعيل':'⏸ إيقاف'}</button>
        <button class="btn ghost" style="height:34px;font-size:12.5px;border-color:var(--danger);color:var(--danger)" onclick="deleteMember('${p.id}')">🗑 مسح</button>
      </div>` : '';
    return `<div class="member" style="${suspended?'opacity:.55':''}">
      <div class="top"><span class="ava" style="width:40px;height:40px;font-size:14px;background:${avaColor(p.id)}">${initials(p.name)}</span>
        <div><div class="name">${p.name} ${suspended?'<span class="miss-badge" style="background:var(--raised2);color:var(--muted)">موقوف</span>':''}</div><div class="role">${roleLabel(p.role)}</div></div></div>
      <div class="field" style="margin-bottom:12px"><label>الدور</label>
        <select onchange="setRole('${p.id}',this.value)">${roleOpts}</select></div>
      ${parentLabel?`<div class="field"><label>${parentLabel}</label>${parentSel}</div>`:`<div class="field"><label>التبعية</label>${parentSel}</div>`}
      ${actions}
    </div>`;
  };
  let body='';
  groups.forEach(([k,title,r])=>{
    const grp=people.filter(p=>p.role===r);
    if(grp.length) body+=`<div class="nav-group-label" style="color:var(--muted);margin:18px 4px 10px;font-size:13px">${title} (${grp.length})</div><div class="grid3">${grp.map(card).join('')}</div>`;
  });
  // قسم توزيع المدرّسين
  const allOwners = ME.role==='admin'?PROFILES:[ME,...PROFILES.filter(p=>descendantIds().includes(p.id))];
  const teacherList = ME.role==='admin'?TEACHERS:TEACHERS.filter(t=>scopeIds().includes(t.owner_id));
  if(teacherList.length){
    body+=`<div class="nav-group-label" style="color:var(--muted);margin:24px 4px 10px;font-size:13px">توزيع المدرّسين (${teacherList.length})</div>
    <div class="grid3">${teacherList.map(t=>`<div class="member">
      <div class="top"><span class="ava" style="width:38px;height:38px;font-size:13px;background:${avaColor(t.id)}">${initials(t.name)}</span>
        <div><div class="name">${t.name}</div><div class="role">${t.subject||'—'}</div></div></div>
      <div class="field"><label>المسؤول عنه</label>
        <select onchange="setTeacherOwner('${t.id}',this.value)">
          ${allOwners.map(o=>`<option value="${o.id}" ${t.owner_id===o.id?'selected':''}>${o.name} · ${roleLabel(o.role)}</option>`).join('')}
        </select></div>
    </div>`).join('')}</div>`;
  }
  return head+body;
}
window.setRole=async function(id,role){
  // changing role may invalidate parent; reset parent if it no longer fits
  const p=U(id); let lead=p.lead_id;
  if(role==='manager'||role==='admin') lead=null;
  const {error}=await sb.from('profiles').update({role,lead_id:lead}).eq('id',id);
  if(error)return toast(error.message,true);
  await reload();render();toast('اتغيّر الدور');
};
window.setParent=async function(id,parentId){
  const {error}=await sb.from('profiles').update({lead_id:parentId||null}).eq('id',id);
  if(error)return toast(error.message,true);
  await reload();render();toast('اتحدّدت التبعية');
};
window.setTeacherOwner=async function(tid,ownerId){
  const {error}=await sb.from('teachers').update({owner_id:ownerId, assigned_at:ymd(new Date())}).eq('id',tid);
  if(error)return toast(error.message,true);
  await reload();render();toast('اتنقل المدرّس');
};
window.toggleActive=async function(id){
  const p=U(id);
  const target = (p.active===false); // currently suspended -> reactivate(true); active -> suspend(false)
  const {error}=await sb.from('profiles').update({active:target}).eq('id',id);
  if(error)return toast(error.message,true);
  await reload();render();toast(target?'اترجّع تفعيله':'اتوقف');
};
window.deleteMember=async function(id){
  const p=U(id);
  if(!confirm(`متأكد تمسح «${p.name}» نهائيًا؟ ده هيشيله من السايت. (الحساب نفسه ممكن تمسحه بعدين من Supabase)`))return;
  // فك ارتباط مدرّسينه ومرؤوسينه الأول
  await sb.from('teachers').update({owner_id:null}).eq('owner_id',id);
  await sb.from('profiles').update({lead_id:null}).eq('lead_id',id);
  const {error}=await sb.from('profiles').delete().eq('id',id);
  if(error)return toast(error.message,true);
  await reload();render();toast('اتمسح');
};
window.renameMember=async function(id){
  const p=U(id);
  const name=prompt('الاسم الجديد:',p.name);
  if(!name||!name.trim()||name.trim()===p.name)return;
  const {error}=await sb.from('profiles').update({name:name.trim()}).eq('id',id);
  if(error)return toast(error.message,true);
  await reload();render();toast('اتعدّل الاسم');
};

    <div class="field"><label>اسم المدرّس</label><input id="t_name" value="${t?escAttr(t.name):''}" placeholder="مثلاً: م. عمر الشربيني"></div>
    <div class="field"><label>المادة</label><input id="t_subject" value="${t?escAttr(t.subject||''):''}" placeholder="مثلاً: إحصاء"></div>
    <div class="field"><label>المسؤول عنه</label><select id="t_owner">
      ${owners.map(o=>`<option value="${o.id}" ${t&&t.owner_id===o.id?'selected':(!t&&o.id===ME.id?'selected':'')}>${o.name} · ${roleLabel(o.role)}</option>`).join('')}
    </select></div>
    <div class="field"><label>يوم الراحة (مايتحاسبش عليه)</label><select id="t_rest">
      ${['الأحد','الاتنين','التلات','الأربع','الخميس','الجمعة','السبت'].map((d,i)=>`<option value="${i}" ${(t?(t.rest_day==null?5:t.rest_day):5)===i?'selected':''}>${d}</option>`).join('')}
    </select></div>`;
  let acts=`<button class="btn primary" id="t_save">${t?'حفظ':'إضافة المدرّس'}</button>`;
  if(t && (ME.role==='admin' || t.owner_id===ME.id || descendantIds().includes(t.owner_id))) acts+=`<button class="danger-link" id="t_del" style="margin-inline-start:auto;background:none;border:none">مسح المدرّس</button>`;
  document.getElementById('mFoot').innerHTML=acts;
  document.getElementById('t_save').onclick=async()=>{
    const name=document.getElementById('t_name').value.trim(); if(!name)return toast('اكتب اسم المدرّس',true);
    const data={name,subject:document.getElementById('t_subject').value.trim()||null,owner_id:val('t_owner'),rest_day:+val('t_rest')};
    let error;
    if(t){
      if(t.owner_id!==data.owner_id) data.assigned_at=ymd(new Date()); // اتنقل لموظف تاني → نبدأ المتابعة من النهارده
      ({error}=await sb.from('teachers').update(data).eq('id',t.id));
    } else {
      data.assigned_at=ymd(new Date());
      ({error}=await sb.from('teachers').insert(data));
    }
    if(error)return toast(error.message,true);
    await reload();closeModal();render();toast(t?'اتحفظ':'اتضاف المدرّس');
  };
  const canDelTeacher = t && (ME.role==='admin' || t.owner_id===ME.id || descendantIds().includes(t.owner_id));
  if(canDelTeacher) document.getElementById('t_del').onclick=async()=>{
    if(confirm('متأكد تمسح المدرّس ده؟ هيتمسح من كل الأماكن.')){await sb.from('teachers').delete().eq('id',t.id);await reload();closeModal();if(view==='linktree')view='board';render();toast('اتمسح');}
  };
  document.getElementById('overlay').classList.add('show');
};

/* ---------- link tree ---------- */
function canEditTeacher(t){
  if(ME.role==='admin')return true;
  if(t.owner_id===ME.id)return true;
  if(ME.role==='lead' && PROFILES.some(p=>p.id===t.owner_id && p.lead_id===ME.id))return true;
  return false;
}
function normUrl(u){ if(!u)return''; u=u.trim(); if(!u)return''; return /^https?:\/\//i.test(u)?u:'https://'+u; }
function linkTreeView(){
  const t=T(linkTeacher); if(!t||!t.id) {view='board';return boardView();}
  const owner=U(t.owner_id);
  const editable=canEditTeacher(t);
  const cards=LINKS.map(l=>{
    const url=normUrl(t[l.key]);
    if(!url) return `<div class="lt-empty">${l.name}: لسه مش متحطوط</div>`;
    return `<a class="lt-card" href="${esc(url)}" target="_blank" rel="noopener">
      <span class="lt-ico" style="background:${l.bg}">${l.ico}</span>
      <div><div class="nm">${l.name}</div><div class="sub">${esc(url.replace(/^https?:\/\//,''))}</div></div>
      <span class="arr">↗</span></a>`;
  }).join('');
  return `<div class="page-head"><div>
      <div class="page-title">${t.name}</div>
      <div class="page-sub">لينكات المدرّس · المسؤول: ${owner.name}</div></div>
      ${editable?`<button class="btn" onclick="openTeacher('${t.id}')">⚙ تعديل المدرّس</button> <button class="btn primary" onclick="editLinks('${t.id}')">✎ تعديل اللينكات</button>`:''}</div>
    <div class="lt-wrap">${cards}</div>`;
}
window.editLinks=function(tid){
  const t=T(tid);
  document.getElementById('mTitle').textContent='تعديل لينكات — '+t.name;
  document.getElementById('mBody').innerHTML=LINKS.map(l=>`
    <div class="field"><label>${l.name} <span style="color:var(--faint)">· ${l.hint}</span></label>
    <input id="lk_${l.key}" value="${escAttr(t[l.key]||'')}" placeholder="https://…" dir="ltr" style="text-align:left"></div>`).join('');
  document.getElementById('mFoot').innerHTML='<button class="btn primary" id="lk_save">حفظ اللينكات</button>';
  document.getElementById('lk_save').onclick=async()=>{
    const upd={};LINKS.forEach(l=>upd[l.key]=normUrl(document.getElementById('lk_'+l.key).value)||null);
    const {error}=await sb.from('teachers').update(upd).eq('id',tid);
    if(error)return toast(error.message,true);
    await reload();closeModal();render();toast('اتحفظت اللينكات');
  };
  document.getElementById('overlay').classList.add('show');
};

/* ---------- card modal ---------- */
window.openCard=function(id,newKind){
  const c=id?CARDS.find(x=>x.id===id):null;
  const kind = c ? (c.kind||'post') : (newKind||boardKind||'post');
  const isTask = kind==='task';
  const ids=scopeIds();
  const assignable=ME.role==='member'?PROFILES.filter(u=>u.id===ME.id):PROFILES.filter(u=>ids.includes(u.id)&&u.role!=='admin');
  if(assignable.length===0) assignable.push(ME);
  const teacherOpts=TEACHERS.filter(t=>ids.includes(t.owner_id));
  const cmts=c?COMMENTS.filter(x=>x.card_id===c.id):[];
  // تاسك مطلوبة من قائد لعضو → العضو ميعدّلش فيها
  const taskLocked = isTask && c && c.requested_by && c.assignee_id===ME.id && c.requested_by!==ME.id && ME.role==='member';
  document.getElementById('mTitle').textContent = c ? c.title : (isTask?'تاسك جديدة':'بوست جديد');
  const statuses = isTask?TASK_STATUSES:STATUSES;
  const startStatus = c?c.status:(isTask?'requested':'idea');

  // مبدّل النوع (للجديد فقط)
  const kindToggle = c ? '' : `<div class="field"><label>النوع</label><div class="seg" id="f_kind">
      <button data-k="post" class="${kind==='post'?'on':''}">📱 بوست (بيتحاسب)</button>
      <button data-k="task" class="${kind==='task'?'on':''}">✅ تاسك (مش بيتحاسب)</button></div></div>`;

  let fields;
  if(isTask){
    fields=`
      <div class="field"><label>عنوان التاسك</label><input id="f_title" value="${c?escAttr(c.title):''}" placeholder="مثلاً: اعمل ديزاين بوست العرض" ${taskLocked?'disabled':''}></div>
      <div class="two"><div class="field"><label>المسؤول</label><select id="f_assignee" ${taskLocked?'disabled':''}>${assignable.map(u=>`<option value="${u.id}" ${c&&c.assignee_id===u.id?'selected':(!c&&u.id===ME.id?'selected':'')}>${u.name}</option>`).join('')}</select></div>
      <div class="field"><label>ميعاد التسليم</label><input type="date" id="f_due" value="${c&&c.due?c.due:''}" ${taskLocked?'disabled':''}></div></div>
      <div class="field"><label>تفاصيل (اختياري)</label><input id="f_caption" value="${c?escAttr(c.caption||''):''}" placeholder="تفاصيل المطلوب…" ${taskLocked?'disabled':''}></div>
      <div class="field"><label>الحالة</label><div class="seg" id="f_status">${statuses.map(s=>`<button data-st="${s.id}" class="${startStatus===s.id?'on':''}">${s.name}</button>`).join('')}</div></div>
      ${taskLocked?'<div class="lt-empty" style="margin-top:4px">دي تاسك مطلوبة منك — تقدر تحرّكها لـ «بيتعمل» من البورد، والتيم ليدر يأكّد إنها خلصت.</div>':''}`;
  } else {
    fields=`
      <div class="field"><label>عنوان البوست</label><input id="f_title" value="${c?escAttr(c.title):''}" placeholder="مثلاً: ريل مراجعة سريعة"></div>
      <div class="two"><div class="field"><label>المدرّس</label><select id="f_teacher">${teacherOpts.length?teacherOpts.map(t=>`<option value="${t.id}" ${c&&c.teacher_id===t.id?'selected':''}>${t.name}</option>`).join(''):'<option value="">— ضيف مدرّس الأول —</option>'}</select></div>
      <div class="field"><label>المسؤول</label><select id="f_assignee">${assignable.map(u=>`<option value="${u.id}" ${c&&c.assignee_id===u.id?'selected':''}>${u.name}</option>`).join('')}</select></div></div>
      <div class="two"><div class="field"><label>التصنيف</label><select id="f_cat">${CATS.map(x=>`<option ${c&&c.category===x?'selected':''}>${x}</option>`).join('')}</select></div>
      <div class="field"><label>المنصة</label><select id="f_plat">${PLATS.map(p=>`<option value="${p.id}" ${c&&c.platform===p.id?'selected':''}>${p.name}</option>`).join('')}</select></div></div>
      <div class="two"><div class="field"><label>الأسبوع</label><select id="f_week">${[1,2,3,4].map(w=>`<option value="${w}" ${c&&c.week===w?'selected':''}>الأسبوع ${w}</option>`).join('')}</select></div>
      <div class="field"><label>ميعاد التسليم</label><input type="date" id="f_due" value="${c&&c.due?c.due:''}"></div></div>
      <div class="field"><label>لينك البوست (اختياري)</label><input id="f_link" value="${c?escAttr(c.post_link||''):''}" placeholder="https://…" dir="ltr" style="text-align:left"></div>
      <div class="field"><label>الكابشن (اختياري)</label><input id="f_caption" value="${c?escAttr(c.caption||''):''}" placeholder="نص البوست…"></div>
      <div class="field"><label>الحالة</label><div class="seg" id="f_status">${statuses.map(s=>`<button data-st="${s.id}" class="${startStatus===s.id?'on':''}">${s.name}</button>`).join('')}</div></div>`;
  }

  document.getElementById('mBody').innerHTML = kindToggle + fields +
    (c?`<div class="field"><label>التعليقات والمراجعة</label><div class="comments" id="f_comments">${cmts.length?cmts.map(cm=>`<div class="cmt"><div class="h"><b>${U(cm.author_id).name}</b><span>${new Date(cm.created_at).toLocaleDateString('ar-EG')}</span></div>${esc(cm.text)}</div>`).join(''):'<div style="color:var(--faint);font-size:12px">مفيش تعليقات</div>'}</div>
    <div style="display:flex;gap:8px;margin-top:10px"><input id="f_newcmt" placeholder="اكتب ملاحظة…" style="flex:1;background:var(--raised);border:1px solid var(--line2);border-radius:10px;color:var(--txt);padding:10px 12px"><button class="btn" id="f_addcmt">إضافة</button></div></div>`:'');

  // مبدّل النوع للجديد: يعيد فتح المودال بالنوع المختار
  if(!c){document.querySelectorAll('#f_kind button').forEach(b=>b.onclick=()=>openCard(null,b.dataset.k));}

  let cur=startStatus;
  if(!taskLocked) document.querySelectorAll('#f_status button').forEach(b=>b.onclick=()=>{
    if(!isTask && ME.role==='member'&&(b.dataset.st==='ready'||b.dataset.st==='published')){toast('الأعضاء بيوصلوا لحد «محتاج مراجعة»',true);return;}
    if(isTask && b.dataset.st==='done' && ME.role==='member' && c && c.requested_by && c.requested_by!==ME.id){toast('التيم ليدر هو اللي يأكّد إنها خلصت',true);return;}
    cur=b.dataset.st;document.querySelectorAll('#f_status button').forEach(x=>x.classList.toggle('on',x===b));});

  const foot=document.getElementById('mFoot');
  let acts = taskLocked ? '' : `<button class="btn primary" id="f_save">${c?'حفظ':'إضافة'}</button>`;
  if(!isTask && c&&canApprove()&&c.status==='review')acts+=`<button class="btn" id="f_approve" style="border-color:var(--ready);color:var(--ready)">✓ موافقة</button><button class="btn" id="f_return" style="border-color:var(--danger);color:var(--danger)">↩ رجوع</button>`;
  if(c && !taskLocked)acts+=`<button class="danger-link" id="f_del" style="margin-inline-start:auto;background:none;border:none">مسح</button>`;
  foot.innerHTML=acts;

  if(c){document.getElementById('f_addcmt').onclick=addCmt;document.getElementById('f_newcmt').addEventListener('keydown',e=>{if(e.key==='Enter')addCmt();});}
  async function addCmt(){const v=document.getElementById('f_newcmt').value.trim();if(!v)return;
    const {error}=await sb.from('comments').insert({card_id:c.id,author_id:ME.id,text:v});if(error)return toast(error.message,true);
    await reload();openCard(id);}

  if(!taskLocked) document.getElementById('f_save').onclick=async()=>{
    const t=document.getElementById('f_title').value.trim();if(!t)return toast('اكتب عنوان',true);
    let data;
    if(isTask){
      const aid=val('f_assignee');
      data={title:t,kind:'task',assignee_id:aid,due:val('f_due')||null,caption:val('f_caption')||null,status:cur,teacher_id:null};
      // لو الكارت جديد واتسند لحد غيري → أنا اللي طلبته
      if(!c) data.requested_by = (aid!==ME.id)?ME.id:null;
    } else {
      data={title:t,kind:'post',teacher_id:val('f_teacher')||null,assignee_id:val('f_assignee'),category:val('f_cat'),platform:val('f_plat'),week:+val('f_week'),due:val('f_due')||null,post_link:normUrl(val('f_link'))||null,caption:val('f_caption')||null,status:cur};
    }
    let error;
    const wasPub = c && c.status==='published';
    if(c)({error}=await sb.from('cards').update(data).eq('id',c.id));
    else ({error}=await sb.from('cards').insert({...data,created_by:ME.id}));
    if(error)return toast(error.message,true);
    if(!isTask && cur==='published' && !wasPub){ const tid=val('f_teacher')||null, aid=val('f_assignee'); if(tid) await recordPublish({teacher_id:tid,assignee_id:aid,id:c?c.id:null}); }
    await reload();closeModal();render();toast(c?'اتحفظ':'اتضاف');
  };
  if(!isTask && c&&canApprove()&&c.status==='review'){
    document.getElementById('f_approve').onclick=async()=>{await sb.from('cards').update({status:'ready'}).eq('id',c.id);await reload();closeModal();render();toast('اتوافق — جاهز للنشر');};
    document.getElementById('f_return').onclick=async()=>{const note=prompt('سبب الرجوع:');if(note===null)return;
      if(note.trim())await sb.from('comments').insert({card_id:c.id,author_id:ME.id,text:'↩ '+note.trim()});
      await sb.from('cards').update({status:'doing'}).eq('id',c.id);await reload();closeModal();render();toast('رجع بملاحظة');};
  }
  if(c && !taskLocked)document.getElementById('f_del').onclick=async()=>{if(confirm('متأكد تمسح؟')){await sb.from('cards').delete().eq('id',c.id);await reload();closeModal();render();toast('اتمسحت');}};
  document.getElementById('overlay').classList.add('show');
};
const val=id=>document.getElementById(id).value;
function closeModal(){document.getElementById('overlay').classList.remove('show');}
function esc(s){return (s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));}
function escAttr(s){return (s||'').replace(/"/g,'&quot;');}
let toastT;function toast(m,bad){const t=document.getElementById('toast');t.textContent=m;t.classList.toggle('bad',!!bad);t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2400);}

/* ---------- wiring ---------- */
function wireApp(){
  const side=document.getElementById('side'), scrim=document.getElementById('scrim');
  const openDrawer=()=>{side.classList.add('open');scrim.classList.add('show');};
  const closeDrawer=()=>{side.classList.remove('open');scrim.classList.remove('show');};
  document.getElementById('menuBtn').onclick=openDrawer;
  scrim.onclick=closeDrawer;
  document.querySelectorAll('.nav-item[data-view]').forEach(b=>b.onclick=()=>{view=b.dataset.view;closeDrawer();render();});
  document.getElementById('addBtn').onclick=()=>openCard(null,boardKind);
  document.getElementById('addTeacherBtn').onclick=()=>openTeacher(null);
  document.getElementById('mClose').onclick=closeModal;
  document.getElementById('overlay').onclick=e=>{if(e.target.id==='overlay')closeModal();};
  document.getElementById('search').addEventListener('input',()=>{if(view!=='board')view='board';render();});
  document.getElementById('logoutBtn').onclick=async()=>{await sb.auth.signOut();};
}

/* auth wiring */
document.getElementById('auGo').onclick=doAuth;
document.getElementById('auPass').addEventListener('keydown',e=>{if(e.key==='Enter')doAuth();});
document.getElementById('auToggle').onclick=toggleMode;

init();
</script>
</body>
</html>
