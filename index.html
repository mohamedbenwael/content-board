function tourSteps(){
  const all=[
    {sel:'[data-view="board"]', title:'البورد — قلب شغلك', text:'الكروت بتتحرّك بالسحب من عمود لعمود. تاب «بوستات» (دي اللي بتتحاسب في تقييمك)، وتاب «تاسكات» (شغل مساعد مش بيتحاسب). جرّب تسحب كارت تغيّر حالته.', roles:['member','lead','manager','admin']},
    {sel:'#addBtn', title:'تضيف شغل', text:'تضيف بوست، أو تبدّل لـ «تاسك» جوه النافذة. لكل كارت تحدّد المدرّس، التصنيف، الأولوية، والمدة المتوقّعة — ودول اللي بيرتّبوا أجندتك.', roles:['member','lead','manager','admin']},
    {sel:'[data-view="agenda"]', title:'الأجندة — ابدأ يومك منها', text:'شغلك مرتّب: المستعجل الأول، وجوه كل يوم اللي وقته أطول فوق. افتحها كل صبح تعرف تبدأ بإيه بالظبط من غير تفكير.', roles:['member','lead','manager','admin']},
    {sel:'[data-view="teachers"]', title:'المدرّسين', text:'كل مدرّس وخطته لوحده. دوس على أي مدرّس تشوف بورده مفلتر عليه، وتقدر تغيّر صورته ولينكاته ويوم راحته (اللي مش بيتحاسب عليه).', roles:['member','lead','manager','admin']},
    {sel:'[data-view="rank"]', title:'التقييم والترتيب', text:'درجتك من ١٠٠: انتظامك في النزول ٣٥٪ + توازن الأنواع ٣٠٪ + جودة شغلك ٢٠٪ + نمو صفحاتك ١٥٪. تشوف ترتيبك في الشركة كمان.', roles:['member','lead','manager','admin']},
    {sel:'[data-view="reports"]', title:'التقارير الشهرية', text:'كل شهر تسجّل أرقام فيسبوك لكل مدرّس (متابعين، مشاهدات، تفاعل) مع إثبات إجباري. السايت بيجمعها مع شغلك في صورة واحدة.', roles:['lead','manager','admin']},
    {sel:'#navManage', title:'إدارة الفريق', text:'تضيف موظفين، تحدّد أدوارهم، توقفهم، وتوزّع المدرّسين. أي حد بترقّيه بتتفتحله مميزات أكتر تلقائيًا.', roles:['manager','admin']},
    {sel:'#bellBtn', title:'الإشعارات', text:'بتوصّلك أول بأول: تاسك اتطلبت منك، بوست اترجّع بملاحظة، أو تذكير المراجعة للقادة. دوس على أي إشعار يوديك للكارت بتاعه.', roles:['member','lead','manager','admin']},
    {sel:'#guideBtn', title:'الدليل', text:'فيه شرح كامل بالخطوات والنصايح وأسئلة شائعة — ارجعله أي وقت من هنا. خلاص إنت جاهز! 🎉', roles:['member','lead','manager','admin']},
  ];
  return all.filter(s=>s.roles.includes(ME.role) && document.querySelector(s.sel));
}
let tourIdx=0, tourList=[];
window.startTour=function(){
  tourList=tourSteps(); tourIdx=0;
  if(!tourList.length)return;
  document.getElementById('tourBackdrop').classList.add('show');
  showTourStep();
};
let tourEl=null, tourHandler=null;
function isMobileTour(){return window.innerWidth<=720;}
function tourDrawer(open){
  const side=document.querySelector('.side'); if(!side)return;
  if(open){side.classList.add('open'); side.style.zIndex='90';}
  else{side.classList.remove('open'); side.style.zIndex='';}
}
function clearTourEl(){
  if(tourEl){
    tourEl.style.zIndex=tourEl.dataset._z||''; tourEl.style.position=tourEl.dataset._pos||'';
    tourEl.style.cursor=''; delete tourEl.dataset._z; delete tourEl.dataset._pos;
    if(tourHandler)tourEl.removeEventListener('click',tourHandler);
  }
  tourEl=null; tourHandler=null;
}
function endTour(){
  clearTourEl();
  if(isMobileTour())tourDrawer(false);
  document.getElementById('tourBackdrop').classList.remove('show');
  document.getElementById('tourSpot').style.display='none';
  document.getElementById('tourPop').style.display='none';
}
window.endTour=endTour;
function showTourStep(){
  clearTourEl();
  const s=tourList[tourIdx]; if(!s){endTour();return;}
  const el=document.querySelector(s.sel); if(!el){tourIdx++;return showTourStep();}
  // على الموبايل: لو العنصر جوه القايمة الجانبية نفتح الدرج، لو في الشريط العلوي نقفله
  const inSide = !!el.closest('.side');
  if(isMobileTour()) tourDrawer(inSide);
  const doStep=()=>{
    el.scrollIntoView({block:'center',behavior:'smooth'});
    setTimeout(()=>{
      const r=el.getBoundingClientRect();
      const spot=document.getElementById('tourSpot');
      spot.style.display='block';
      spot.style.top=(r.top-6)+'px'; spot.style.left=(r.left-6)+'px';
      spot.style.width=(r.width+12)+'px'; spot.style.height=(r.height+12)+'px';
      const last=tourIdx===tourList.length-1;
      const clickStep = s.sel.indexOf('[data-view')===0 && !last;
      if(clickStep){
        tourEl=el;
        el.dataset._z=el.style.zIndex||''; el.dataset._pos=el.style.position||'';
        if(getComputedStyle(el).position==='static')el.style.position='relative';
        el.style.zIndex='97'; el.style.cursor='pointer';
        tourHandler=()=>{ if(isMobileTour())tourDrawer(false); setTimeout(()=>nextTour(),420); };
        el.addEventListener('click',tourHandler,{once:true});
      }
      const pop=document.getElementById('tourPop');
      pop.innerHTML=`<h4>${s.title}</h4><p>${s.text}</p>
        <div class="row"><span class="step">${tourIdx+1} / ${tourList.length}</span>
          <div class="btns">${last?'':'<button onclick="endTour()">تخطّي</button>'}
          ${clickStep?'<button class="primary" onclick="nextTour()">👆 دوس عليها</button>':`<button class="primary" onclick="nextTour()">${last?'تمام 🎉':'التالي ›'}</button>`}</div></div>`;
      pop.style.display='block';
      const pw=Math.min(300,window.innerWidth-24);
      let top=r.bottom+12, left=Math.min(Math.max(12,r.left), Math.max(12,window.innerWidth-pw-12));
      if(top+190>window.innerHeight) top=Math.max(12,r.top-198);
      pop.style.top=top+'px'; pop.style.left=left+'px';
    },300);
  };
  // ندي وقت للدرج يفتح/يقفل الأول على الموبايل
  if(isMobileTour()) setTimeout(doStep,300); else doStep();
}
window.nextTour=function(){clearTourEl();tourIdx++; if(tourIdx>=tourList.length){endTour();return;} showTourStep();};
window.addEventListener('resize',()=>{if(document.getElementById('tourBackdrop').classList.contains('show'))showTourStep();});

/* ---------- card modal ---------- */
window.openCard=function(id,newKind){
  const c=id?CARDS.find(x=>x.id===id):null;
  const kind = c ? (c.kind||'post') : (newKind||boardKind||'post');
  const isTask = kind==='task';
  const ids=scopeIds();
  const assignable=ME.role==='member'?PROFILES.filter(u=>u.id===ME.id):PROFILES.filter(u=>ids.includes(u.id)&&u.role!=='admin');
  if(assignable.length===0) assignable.push(ME);
  const initAssignee = c?c.assignee_id:ME.id;
  const teachersForOwner=(oid)=>TEACHERS.filter(t=>t.owner_id===oid);
  const teacherOpts=teachersForOwner(initAssignee);
  const cmts=c?COMMENTS.filter(x=>x.card_id===c.id):[];
  // تاسك مطلوبة من قائد لعضو → العضو ميعدّلش فيها
  const taskLocked = isTask && c && c.requested_by && c.assignee_id===ME.id && c.requested_by!==ME.id && ME.role==='member';
  document.getElementById('mTitle').textContent = c ? c.title : (isTask?'تاسك جديدة':'بوست جديد');
  const statuses = isTask?TASK_STATUSES:STATUSES;
  const startStatus = c?c.status:(isTask?'requested':'idea');

  // مبدّل النوع (للجديد فقط)
  const kindToggle = c ? '' : `<div class="field"><label>النوع</label><div class="seg" id="f_kind">
      <button data-k="post" class="${kind==='post'?'on':''}">📱 بوست (بيتحاسب)</button>
      <button data-k="task" class="${kind==='task'?'on':''}">✅ تاسك (مش بيتحاسب)</button></div></div>`;

  // اختيارات الأولوية والمدة (للنوعين)
  const prioField=`<div class="field"><label>الأولوية</label><div class="seg" id="f_prio">${PRIORITIES.map(p=>`<button data-p="${p.id}" class="${(c?prio(c.priority).id:'normal')===p.id?'on':''}" ${taskLocked?'disabled':''}>${p.ico} ${p.name}</button>`).join('')}</div></div>`;
  const effortField=`<div class="field"><label>المدة المتوقّعة (اللي بياخد وقت أطول يظهر الأول في الأجندة)</label><select id="f_effort" ${taskLocked?'disabled':''}><option value="">—</option>${EFFORTS.map(e=>`<option value="${e.m}" ${c&&c.effort===e.m?'selected':''}>${e.name}</option>`).join('')}</select></div>`;

  let fields;
  if(isTask){
    const tIds=c?(c.teacher_ids||[]):[];
    fields=`
      <div class="field"><label>عنوان التاسك</label><input id="f_title" value="${c?escAttr(c.title):''}" placeholder="مثلاً: اعمل ديزاين بوست العرض" ${taskLocked?'disabled':''}></div>
      <div class="two"><div class="field"><label>نوع التاسك</label><select id="f_tasktype" ${taskLocked?'disabled':''}>${TASK_TYPES.map(x=>`<option ${c&&c.category===x?'selected':''}>${x}</option>`).join('')}</select></div>
      <div class="field"><label>المسؤول</label><select id="f_assignee" ${taskLocked?'disabled':''}>${assignable.map(u=>`<option value="${u.id}" ${c&&c.assignee_id===u.id?'selected':(!c&&u.id===ME.id?'selected':'')}>${u.name}</option>`).join('')}</select></div></div>
      <div class="field"><label>المدرّسين (اختياري — التاسك تخص مين)</label><div class="seg" id="f_teachers" style="flex-wrap:wrap">${teacherOpts.length?teacherOpts.map(t=>`<button data-tid="${t.id}" class="${tIds.includes(t.id)?'on':''}" ${taskLocked?'disabled':''} style="flex:none">${t.name}</button>`).join(''):'<span style="color:var(--faint);font-size:12px">مفيش مدرّسين في نطاقك</span>'}</div></div>
      <div class="two">${prioField}${effortField}</div>
      <div class="field"><label>ميعاد التسليم</label><input type="date" id="f_due" value="${c&&c.due?c.due:''}" ${taskLocked?'disabled':''}></div>
      <div class="field"><label>تفاصيل (اختياري)</label><input id="f_caption" value="${c?escAttr(c.caption||''):''}" placeholder="تفاصيل المطلوب…" ${taskLocked?'disabled':''}></div>
      <div class="field"><label>الحالة</label><div class="seg" id="f_status">${statuses.map(s=>`<button data-st="${s.id}" class="${startStatus===s.id?'on':''}">${s.name}</button>`).join('')}</div></div>
      ${taskLocked?'<div class="lt-empty" style="margin-top:4px">دي تاسك مطلوبة منك — تقدر تحرّكها لـ «بيتعمل» من البورد، والتيم ليدر يأكّد إنها خلصت.</div>':''}`;
  } else {
    fields=`
      <div class="field"><label>عنوان البوست</label><input id="f_title" value="${c?escAttr(c.title):''}" placeholder="مثلاً: ريل مراجعة سريعة"></div>
      <div class="two"><div class="field"><label>المدرّس</label><select id="f_teacher">${teacherOpts.length?teacherOpts.map(t=>`<option value="${t.id}" ${c&&c.teacher_id===t.id?'selected':''}>${t.name}</option>`).join(''):'<option value="">— ضيف مدرّس الأول —</option>'}</select></div>
      <div class="field"><label>المسؤول</label><select id="f_assignee">${assignable.map(u=>`<option value="${u.id}" ${c&&c.assignee_id===u.id?'selected':(!c&&u.id===ME.id?'selected':'')}>${u.name}</option>`).join('')}</select></div></div>
      <div class="two"><div class="field"><label>التصنيف</label><select id="f_cat" onchange="document.getElementById('reelWrap').style.display=this.value==='ريلز'?'block':'none'">${CATS.map(x=>`<option ${c&&c.category===x?'selected':''}>${x}</option>`).join('')}</select></div>
      <div class="field"><label>المنصة</label><select id="f_plat">${PLATS.map(p=>`<option value="${p.id}" ${c&&c.platform===p.id?'selected':''}>${p.name}</option>`).join('')}</select></div></div>
      <div class="field" id="reelWrap" style="display:${c&&c.category==='ريلز'?'block':'none'}"><label>نوع الريل</label><select id="f_subtype">${REEL_TYPES.map(r=>`<option value="${r.id}" ${c&&c.subtype===r.id?'selected':''}>${r.name}</option>`).join('')}</select></div>
      <div class="two">${prioField}${effortField}</div>
      <div class="field"><label>ميعاد التسليم</label><input type="date" id="f_due" value="${c&&c.due?c.due:''}"></div>
      <div class="field"><label>لينك البوست (اختياري)</label><input id="f_link" value="${c?escAttr(c.post_link||''):''}" placeholder="https://…" dir="ltr" style="text-align:left"></div>
      <div class="field"><label>الكابشن (اختياري)</label><input id="f_caption" value="${c?escAttr(c.caption||''):''}" placeholder="نص البوست…"></div>
      <div class="field"><label>الحالة</label><div class="seg" id="f_status">${statuses.map(s=>`<button data-st="${s.id}" class="${startStatus===s.id?'on':''}">${s.name}</button>`).join('')}</div></div>
      ${canApprove()?`<div class="field"><label>تقييم الفكرة/الشغل (بيدخل في تقييم الموظف)</label><div class="seg" id="f_quality">${QUALITY.map(q=>`<button data-q="${q.v}" class="${c&&c.quality===q.v?'on':''}">${q.name}</button>`).join('')}</div></div>`
        : (c&&c.quality?`<div class="field"><label>تقييم القائد لشغلك</label><div class="lt-empty" style="margin:0">${qualityBadge(c)}</div></div>`:'')}`;
  }

  document.getElementById('mBody').innerHTML = kindToggle + fields +
    (c?`<div class="field"><label>التعليقات والمراجعة</label><div class="comments" id="f_comments">${cmts.length?cmts.map(cm=>`<div class="cmt"><div class="h"><b>${U(cm.author_id).name}</b><span>${new Date(cm.created_at).toLocaleDateString('ar-EG')}</span></div>${esc(cm.text)}</div>`).join(''):'<div style="color:var(--faint);font-size:12px">مفيش تعليقات</div>'}</div>
    <div style="display:flex;gap:8px;margin-top:10px"><input id="f_newcmt" placeholder="اكتب ملاحظة…" style="flex:1;background:var(--raised);border:1px solid var(--line2);border-radius:10px;color:var(--txt);padding:10px 12px"><button class="btn" id="f_addcmt">إضافة</button></div></div>`:'');

  // مبدّل النوع للجديد: يعيد فتح المودال بالنوع المختار
  if(!c){document.querySelectorAll('#f_kind button').forEach(b=>b.onclick=()=>openCard(null,b.dataset.k));}

  let cur=startStatus;
  if(!taskLocked) document.querySelectorAll('#f_status button').forEach(b=>b.onclick=()=>{
    if(!isTask && ME.role==='member'&&(b.dataset.st==='ready'||b.dataset.st==='published')){toast('الأعضاء بيوصلوا لحد «محتاج مراجعة»',true);return;}
    if(isTask && b.dataset.st==='done' && ME.role==='member' && c && c.requested_by && c.requested_by!==ME.id){toast('التيم ليدر هو اللي يأكّد إنها خلصت',true);return;}
    cur=b.dataset.st;document.querySelectorAll('#f_status button').forEach(x=>x.classList.toggle('on',x===b));});

  // الأولوية
  let curPrio = c?prio(c.priority).id:'normal';
  if(!taskLocked) document.querySelectorAll('#f_prio button').forEach(b=>b.onclick=()=>{
    curPrio=b.dataset.p;document.querySelectorAll('#f_prio button').forEach(x=>x.classList.toggle('on',x===b));});

  // تقييم الجودة (للقائد) — اختياري
  let curQuality = c?(c.quality||null):null;
  document.querySelectorAll('#f_quality button').forEach(b=>b.onclick=()=>{
    const v=+b.dataset.q;
    if(curQuality===v){curQuality=null;b.classList.remove('on');} // دوسة تانية تلغي
    else{curQuality=v;document.querySelectorAll('#f_quality button').forEach(x=>x.classList.toggle('on',x===b));}});

  // المدرّسين المتعدّدين (للتاسك)
  let curTeachers = c?(c.teacher_ids||[]).slice():[];
  function wireTeacherButtons(){
    if(taskLocked)return;
    document.querySelectorAll('#f_teachers button').forEach(b=>b.onclick=()=>{
      const tid=b.dataset.tid;
      if(curTeachers.includes(tid)){curTeachers=curTeachers.filter(x=>x!==tid);b.classList.remove('on');}
      else{curTeachers.push(tid);b.classList.add('on');}});
  }
  wireTeacherButtons();

  // لما يتغيّر المسؤول → قايمة المدرّسين تتغيّر لمدرّسين المسؤول الجديد
  const asgEl=document.getElementById('f_assignee');
  if(asgEl && !taskLocked) asgEl.onchange=()=>{
    const oid=asgEl.value;
    const list=teachersForOwner(oid);
    if(isTask){
      curTeachers=[]; // مدرّسين مختلفين، نبدأ من جديد
      const wrap=document.getElementById('f_teachers');
      wrap.innerHTML = list.length?list.map(t=>`<button data-tid="${t.id}" style="flex:none">${t.name}</button>`).join(''):'<span style="color:var(--faint);font-size:12px">مفيش مدرّسين للمسؤول ده</span>';
      wireTeacherButtons();
    } else {
      const sel=document.getElementById('f_teacher');
      if(sel) sel.innerHTML = list.length?list.map(t=>`<option value="${t.id}">${t.name}</option>`).join(''):'<option value="">— مفيش مدرّسين للمسؤول ده —</option>';
    }
  };

  const foot=document.getElementById('mFoot');
  let acts = taskLocked ? '' : `<button class="btn primary" id="f_save">${c?'حفظ':'إضافة'}</button>`;
  if(!isTask && c&&canApprove()&&c.status==='review')acts+=`<button class="btn" id="f_approve" style="border-color:var(--ready);color:var(--ready)">✓ موافقة</button><button class="btn" id="f_return" style="border-color:var(--danger);color:var(--danger)">↩ رجوع</button>`;
  if(c && !taskLocked)acts+=`<button class="danger-link" id="f_del" style="margin-inline-start:auto;background:none;border:none">مسح</button>`;
  foot.innerHTML=acts;

  if(c){document.getElementById('f_addcmt').onclick=addCmt;document.getElementById('f_newcmt').addEventListener('keydown',e=>{if(e.key==='Enter')addCmt();});}
  async function addCmt(){const v=document.getElementById('f_newcmt').value.trim();if(!v)return;
    const {error}=await sb.from('comments').insert({card_id:c.id,author_id:ME.id,text:v});if(error)return toast(error.message,true);
    await reload();openCard(id);}

  if(!taskLocked) document.getElementById('f_save').onclick=async()=>{
    const t=document.getElementById('f_title').value.trim();if(!t)return toast('اكتب عنوان',true);
    let data;
    if(isTask){
      const aid=val('f_assignee');
      data={title:t,kind:'task',assignee_id:aid,category:val('f_tasktype'),teacher_ids:curTeachers.length?curTeachers:null,
        priority:curPrio,effort:val('f_effort')?+val('f_effort'):null,due:val('f_due')||null,caption:val('f_caption')||null,status:cur,teacher_id:null};
      if(!c) data.requested_by = (aid!==ME.id)?ME.id:null;
    } else {
      data={title:t,kind:'post',teacher_id:val('f_teacher')||null,assignee_id:val('f_assignee'),category:val('f_cat'),
        subtype:val('f_cat')==='ريلز'?(val('f_subtype')||null):null,platform:val('f_plat'),
        priority:curPrio,effort:val('f_effort')?+val('f_effort'):null,due:val('f_due')||null,
        post_link:normUrl(val('f_link'))||null,caption:val('f_caption')||null,status:cur,quality:curQuality};
    }
    let error;
    const wasPub = c && c.status==='published';
    if(c)({error}=await sb.from('cards').update(data).eq('id',c.id));
    else ({error}=await sb.from('cards').insert({...data,created_by:ME.id}));
    if(error)return toast(error.message,true);
    // إشعار: تاسك مطلوبة من قائد لعضو
    if(!c && isTask && data.requested_by){ await notify(data.assignee_id,'task_assigned',`${ME.name} بعتلك تاسك: ${t}${data.due?' — تسليمها '+data.due:''}`,null); }
    const pubTransition = (!isTask && cur==='published' && !wasPub);
    if(pubTransition && !c){ const tid=val('f_teacher')||null, aid=val('f_assignee'); if(tid) await recordPublish({teacher_id:tid,assignee_id:aid,id:null}); }
    // إشعار: القائد قيّم بوست العضو
    if(!isTask && curQuality && (!c || c.quality!==curQuality) && data.assignee_id!==ME.id){
      await notify(data.assignee_id,'post_rated',`${ME.name} قيّم بوستك «${t}»: ${qualityName(curQuality)}`,c?c.id:null);
    }
    // إشعار: عضو حوّل بوست لـ«محتاج مراجعة» → القائد بتاعه
    if(!isTask && cur==='review' && (!c || c.status!=='review')){
      const lead=U(data.assignee_id).lead_id; if(lead) await notify(lead,'post_review',`${U(data.assignee_id).name} مستني مراجعتك على البوست: ${t}`,c?c.id:null);
    }
    await reload();closeModal();render();toast(c?'اتحفظ':'اتضاف');
    if(pubTransition && c){ openPublishDate(c.id); }
  };
  if(!isTask && c&&canApprove()&&c.status==='review'){
    document.getElementById('f_approve').onclick=async()=>{
      await sb.from('cards').update({status:'ready',quality:curQuality}).eq('id',c.id);
      if(curQuality && c.quality!==curQuality && c.assignee_id!==ME.id) await notify(c.assignee_id,'post_rated',`${ME.name} قيّم بوستك «${c.title}»: ${qualityName(curQuality)}`,c.id);
      await reload();closeModal();render();toast('اتوافق — جاهز للنشر');};
    document.getElementById('f_return').onclick=async()=>{const note=prompt('سبب الرجوع:');if(note===null)return;
      if(note.trim())await sb.from('comments').insert({card_id:c.id,author_id:ME.id,text:'↩ '+note.trim()});
      await sb.from('cards').update({status:'doing'}).eq('id',c.id);
      await notify(c.assignee_id,'post_returned',`${ME.name} رجّع البوست «${c.title}» للتعديل${note.trim()?': '+note.trim():''}`,c.id);
      await reload();closeModal();render();toast('رجع بملاحظة');};
  }
  if(c && !taskLocked)document.getElementById('f_del').onclick=async()=>{if(confirm('متأكد تمسح؟')){await sb.from('cards').delete().eq('id',c.id);await reload();closeModal();render();toast('اتمسحت');}};
  document.getElementById('overlay').classList.add('show');
};
const val=id=>document.getElementById(id).value;
function closeModal(){document.getElementById('overlay').classList.remove('show');}
function esc(s){return (s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));}
function escAttr(s){return (s||'').replace(/"/g,'&quot;');}
let toastT;function toast(m,bad){const t=document.getElementById('toast');t.textContent=m;t.classList.toggle('bad',!!bad);t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2400);}

/* ---------- notifications 🔔 ---------- */
async function notify(userId,type,text,cardId){
  if(!userId||userId===ME.id) return; // مش بنبعت لنفسنا
  await sb.from('notifications').insert({user_id:userId,actor_id:ME.id,type,text,card_id:cardId||null});
}
function notifIco(t){return t==='task_assigned'?'📋':t==='task_progress'?'✅':t==='post_returned'?'↩':t==='weekly_review'?'🗓':t==='post_review'?'🔔':t==='post_rated'?'⭐':t==='post_approved'?'✅':t==='signup'?'📝':t==='month_start'?'🗓':t==='miss_alert'?'⚠️':t==='due_alert'?'⏰':t==='balance_alert'?'📊':t==='balance_team'?'📋':'🔔';}
function visibleNotifs(){
  return NOTIFS.filter(n=>!(n.type==='weekly_review' && ME.role!=='lead' && ME.role!=='manager'));
}
function renderBell(){
  const unread=visibleNotifs().filter(n=>!n.is_read).length;
  const b=document.getElementById('nbadge');
  if(b){ b.textContent=unread; b.style.display=unread?'grid':'none'; }
}
function timeAgo(ts){const s=Math.floor((Date.now()-new Date(ts))/1000);
  if(s<60)return'دلوقتي';if(s<3600)return Math.floor(s/60)+' د';if(s<86400)return Math.floor(s/3600)+' س';return Math.floor(s/86400)+' ي';}
function toggleNotifPanel(){
  const p=document.getElementById('notifPanel');
  if(p.classList.contains('show')){p.classList.remove('show');return;}
  const list=visibleNotifs();
  p.innerHTML = list.length ? (
    `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 10px"><b style="font-size:13px">الإشعارات</b>${list.some(n=>!n.is_read)?'<span style="font-size:11.5px;color:var(--brand);cursor:pointer" onclick="markAllRead()">تعليم الكل مقروء</span>':''}</div>`
    + list.map(n=>`<div class="notif-item ${n.is_read?'':'unread'}" onclick="openNotif('${n.id}','${n.card_id||''}')">
        <span class="nico">${notifIco(n.type)}</span>
        <div><div class="ntext">${esc(n.text)}</div><div class="ntime">${timeAgo(n.created_at)}</div></div></div>`).join('')
  ) : '<div style="padding:24px;text-align:center;color:var(--faint);font-size:13px">مفيش إشعارات</div>';
  p.classList.add('show');
}
window.openNotif=async function(id,cardId){
  const n=NOTIFS.find(x=>x.id===id);
  if(n&&!n.is_read){await sb.from('notifications').update({is_read:true}).eq('id',id);n.is_read=true;renderBell();}
  document.getElementById('notifPanel').classList.remove('show');
  if(cardId){const c=CARDS.find(x=>x.id===cardId); if(c){boardKind=c.kind||'post';view='board';render();setTimeout(()=>openCard(cardId),50);}}
};
window.markAllRead=async function(){
  await sb.from('notifications').update({is_read:true}).eq('user_id',ME.id).eq('is_read',false);
  NOTIFS.forEach(n=>n.is_read=true);renderBell();toggleNotifPanel();toggleNotifPanel();
};
// تذكير المراجعة الأسبوعية (الخميس) للتيم ليدر/الأكونت مانجر
async function checkWeeklyReview(){
  if(ME.role!=='lead'&&ME.role!=='manager')return;
  if(new Date().getDay()!==4)return; // 4 = الخميس
  // مبعتش قبل كده الأسبوع ده؟
  const weekAgo=new Date(Date.now()-6*864e5).toISOString();
  const already=NOTIFS.some(n=>n.type==='weekly_review'&&n.created_at>weekAgo);
  if(already)return;
  await sb.from('notifications').insert({user_id:ME.id,actor_id:ME.id,type:'weekly_review',text:'🗓 مراجعة الأسبوع: راجع شغل فريقك وقيّم أداءهم الأسبوع ده.'});
  await refetchMyNotifs();
}
async function refetchMyNotifs(){
  const {data}=await sb.from('notifications').select('*').eq('user_id',ME.id).order('created_at',{ascending:false}).limit(50);
  NOTIFS=data||NOTIFS;
}
// ===== تقرير Balance الكونتنت الأسبوعي =====
// يتبعت مرة في الأسبوع لكل عضو بتفاصيل مدرّسينه (كوميك/ريلز/ديزاين)
// وللتيم ليدر ملخص كامل لفريقه + تنبيهات لكل عضو عنده مخالفات
async function checkBalanceAlerts(){
  // الجمعة (5) = آخر يوم في الأسبوع (السبت → الجمعة)
  if(new Date().getDay()!==5) return;
  const weekAgo=new Date(Date.now()-6*864e5).toISOString();
  // helper: سطر واحد لكل مدرّس بشكل نظيف
  function teacherLine(t){
    const {counts,issues}=teacherWeekCompliance(t.id);
    const parts=COMPLIANCE_RULES.map(r=>{
      const got=counts[r.cat]||0;
      const issue=issues.find(i=>i.rule.cat===r.cat);
      if(!issue) return null; // بس اللي فيه مشكلة
      return issue.kind==='over'
        ? `${r.ico} ${r.label}: ${got} (الحد ${r.n}) 🔴`
        : `${r.ico} ${r.label}: ${got} (المطلوب ${r.n}+) 🟠`;
    }).filter(Boolean);
    return parts.length ? `  • ${t.name}:\n    ${parts.join('\n    ')}` : null;
  }

  // ===== العضو: تقرير مدرّسيه =====
  if(ME.role==='member'){
    const hadOwn=NOTIFS.some(n=>n.type==='balance_alert'&&n.created_at>weekAgo);
    if(!hadOwn){
      const myTeachers=TEACHERS.filter(t=>t.owner_id===ME.id);
      if(myTeachers.length){
        const vioLines=myTeachers.map(teacherLine).filter(Boolean);
        const hasVio=vioLines.length>0;
        const text=hasVio
          ? `📊 تقرير الأسبوع — كونتنت مدرّسينك\n⚠️ في مخالفات:\n\n${vioLines.join('\n\n')}`
          : `📊 تقرير الأسبوع — كونتنت مدرّسينك\n✅ كل حاجة تمام الأسبوع ده`;
        await sb.from('notifications').insert({user_id:ME.id,actor_id:ME.id,type:'balance_alert',text});
        if(ME.lead_id&&hasVio){
          const names=myTeachers.filter(t=>teacherWeekCompliance(t.id).issues.length).map(t=>t.name).join('، ');
          await sb.from('notifications').insert({user_id:ME.lead_id,actor_id:ME.id,type:'balance_alert',
            text:`📊 ${ME.name} — مخالفات balance عند:\n${names}`});
        }
        await refetchMyNotifs();
      }
    }
    return;
  }

  // ===== التيم ليدر / الأكونت مانجر =====
  if(ME.role==='lead'||ME.role==='manager'){
    const hadTeam=NOTIFS.some(n=>n.type==='balance_team'&&n.created_at>weekAgo);
    if(hadTeam) return;
    const members=descendantIds().filter(id=>U(id).role==='member'&&U(id).active!==false);
    if(!members.length) return;

    const summaryLines=[], vioMembers=[];
    for(const memberId of members){
      const mTeachers=TEACHERS.filter(t=>t.owner_id===memberId);
      if(!mTeachers.length) continue;
      const lines=mTeachers.map(teacherLine).filter(Boolean);
      const mName=U(memberId).name;
      if(lines.length){
        vioMembers.push(mName);
        summaryLines.push(`⚠️ ${mName} (${lines.length} مشكلة):\n${lines.join('\n')}`);
        // تنبيه للعضو نفسه
        const {data:ex}=await sb.from('notifications').select('id').eq('user_id',memberId).eq('type','balance_alert').gte('created_at',weekAgo).limit(1);
        if(!ex||!ex.length){
          await sb.from('notifications').insert({user_id:memberId,actor_id:ME.id,type:'balance_alert',
            text:`📊 تنبيه من ${ME.name}\nالمدرّسين دول عندهم مخالفات:\n\n${lines.join('\n\n')}\n\nاتأكد إن الكونتنت متوازن.`});
        }
      } else {
        summaryLines.push(`✅ ${mName}: كل حاجة تمام`);
      }
    }
    const header=vioMembers.length
      ? `⚠️ ${vioMembers.length} عضو عندهم مخالفات`
      : `✅ فريقك كله ملتزم`;
    await sb.from('notifications').insert({user_id:ME.id,actor_id:ME.id,type:'balance_team',
      text:`📋 ملخص Balance فريقك\n${header}\n\n${summaryLines.join('\n\n')}`});
    if(ME.role==='lead'&&ME.lead_id&&vioMembers.length){
      await sb.from('notifications').insert({user_id:ME.lead_id,actor_id:ME.id,type:'balance_team',
        text:`📋 فريق ${ME.name} — مخالفات balance عند:\n${vioMembers.join('، ')}`});
    }
    await refetchMyNotifs();
  }
}

// تذكيرات دورية بتظهر أول ما تفتح السايت (بداية الشهر / المدرّس ما نزلش / مواعيد متأخرة)
async function checkPeriodicNotifs(){
  const today=ymd(new Date()), ym=ymNow(), inserts=[];
  // (١) بداية الشهر: مهام أول الشهر (مرة في الشهر)
  const hadMonth=NOTIFS.some(n=>n.type==='month_start' && (n.created_at||'').slice(0,7)===ym);
  if(!hadMonth){
    if(ME.role==='member'){
      inserts.push({type:'month_start',text:'🗓 أول الشهر: سجّل تقرير الشهر اللي فات (متابعين/مشاهدات/تفاعل) لكل مدرّسينك من صفحة «التقارير الشهرية».'});
    } else if(ME.role==='lead'||ME.role==='manager'){
      inserts.push({type:'month_start',text:'🗓 أول الشهر: قيّم متابعة مدرّسين فريقك عن الشهر اللي فات (من «التقييم ← متابعة المدرّسين»)، واتأكد إن فريقك سجّل تقاريرهم.'});
    }
  }
  // (٢) للعضو: مدرّس ما نزّلش امبارح (تذكير يومي، مرة في اليوم)
  if(ME.role==='member'){
    const hadMiss=NOTIFS.some(n=>n.type==='miss_alert' && (n.created_at||'').slice(0,10)===today);
    if(!hadMiss){
      const y=new Date(Date.now()-864e5); const yStr=ymd(y);
      const myTeachers=TEACHERS.filter(t=>t.owner_id===ME.id);
      const missed=myTeachers.filter(t=>{
        const done=publishedDays(t.id); const assigned=t.assigned_at?new Date(t.assigned_at+'T00:00:00'):null;
        if(assigned && y<assigned) return false;
        return !done.has(yStr) && !forgivenDaysForTeacher(t.id).has(yStr);
      }).map(t=>t.name);
      if(missed.length) inserts.push({type:'miss_alert',text:`⚠️ امبارح ما نزلش بوست لـ: ${missed.join('، ')}. لو فيه سبب تمام، لو لأ عوّضها.`});
    }
  }
  // (٣) مواعيد متأخرة عليّ (مرة في اليوم)
  const hadDue=NOTIFS.some(n=>n.type==='due_alert' && (n.created_at||'').slice(0,10)===today);
  if(!hadDue){
    const overdue=CARDS.filter(c=>c.assignee_id===ME.id && isLate(c));
    if(overdue.length) inserts.push({type:'due_alert',text:`⏰ عندك ${overdue.length} ${overdue.length===1?'حاجة متأخرة':'حاجات متأخرة'} عن ميعادها. راجع الأجندة.`});
  }
  // (٤) للقائد: عضو في فريقك فوّت أيام كتير (مرة في الأسبوع)
  if(ME.role==='lead'||ME.role==='manager'){
    const weekAgo=new Date(Date.now()-6*864e5).toISOString();
    const hadPerf=NOTIFS.some(n=>n.type==='perf_alert'&&n.created_at>weekAgo);
    if(!hadPerf){
      const weak=descendantIds().filter(id=>U(id).role==='member'&&U(id).active!==false).filter(id=>memberMissed(id)>=5).map(id=>U(id).name);
      if(weak.length) inserts.push({type:'perf_alert',text:`⚠️ في فريقك فوّتوا أيام كتير الشهر ده: ${weak.join('، ')}. تابع معاهم.`});
    }
  }
  if(inserts.length){
    for(const it of inserts){ await sb.from('notifications').insert({user_id:ME.id,actor_id:ME.id,type:it.type,text:it.text}); }
    await refetchMyNotifs();
  }
}

/* ---------- wiring ---------- */
function wireApp(){
  const side=document.getElementById('side'), scrim=document.getElementById('scrim');
  const openDrawer=()=>{side.classList.add('open');scrim.classList.add('show');};
  const closeDrawer=()=>{side.classList.remove('open');scrim.classList.remove('show');};
  document.getElementById('menuBtn').onclick=openDrawer;
  scrim.onclick=closeDrawer;
  document.getElementById('bellBtn').onclick=(e)=>{e.stopPropagation();toggleNotifPanel();};
  document.getElementById('guideBtn').onclick=()=>openGuide();
  document.addEventListener('click',e=>{const p=document.getElementById('notifPanel');if(p&&p.classList.contains('show')&&!p.contains(e.target)&&e.target.id!=='bellBtn')p.classList.remove('show');});
  document.querySelectorAll('.nav-item[data-view]').forEach(b=>b.onclick=()=>{view=b.dataset.view;closeDrawer();render();});
  document.getElementById('addBtn').onclick=()=>openCard(null,boardKind);
  document.getElementById('addTeacherBtn').onclick=()=>openTeacher(null);
  document.getElementById('mClose').onclick=closeModal;
  document.getElementById('overlay').onclick=e=>{if(e.target.id==='overlay')closeModal();};
  document.getElementById('search').addEventListener('input',()=>{if(view!=='board')view='board';render();});
  document.getElementById('logoutBtn').onclick=async()=>{await sb.auth.signOut();};
}

/* auth wiring */
document.getElementById('auGo').onclick=doAuth;
document.getElementById('auPass').addEventListener('keydown',e=>{if(e.key==='Enter')doAuth();});
document.getElementById('auToggle').onclick=toggleMode;

init();
