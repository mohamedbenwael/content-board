<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بورد المحتوى</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    /* A to Z identity — navy on white */
    --bg:#F4F6FA; --panel:#FFFFFF; --raised:#F7F9FC; --raised2:#EDF1F7;
    --line:#E2E8F0; --line2:#D2DBE8;
    --txt:#16223D; --muted:#64718A; --faint:#9AA6BC;
    --brand:#1B2A4A; --brand-dim:#E7ECF5;        /* navy primary */
    --idea:#4A6FB5; --doing:#E0922A; --review:#8B5CC2; --ready:#23A66B; --pub:#4F7A9E;
    --danger:#D64545; --danger-dim:#FBE7E7;
    --radius:14px; --radius-s:10px; --shadow:0 8px 26px rgba(27,42,74,.12);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Tajawal',system-ui,sans-serif;
    background:radial-gradient(1100px 500px at 90% -10%, #EAF0FA 0%, transparent 55%),
      radial-gradient(800px 450px at -10% 110%, #EEF1F7 0%, transparent 50%), var(--bg);
    color:var(--txt);font-size:14px;line-height:1.5;min-height:100%;-webkit-font-smoothing:antialiased}
  .mono{font-family:'Space Mono',monospace;font-variant-numeric:tabular-nums}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font-family:inherit;font-size:14px}
  ::selection{background:var(--brand);color:#fff}

  /* ---------- Auth screen ---------- */
  .auth-wrap{min-height:100vh;display:grid;place-items:center;padding:24px}
  .auth{width:400px;max-width:100%;background:var(--panel);border:1px solid var(--line2);border-radius:20px;padding:34px 30px;box-shadow:var(--shadow)}
  .auth .logo{width:auto;height:64px;display:block;margin:0 auto 18px}
  .auth .logo img{height:64px;width:auto;object-fit:contain}
  .auth h1{text-align:center;font-size:22px;font-weight:900;margin-bottom:5px}
  .auth .sub{text-align:center;color:var(--muted);font-size:13px;margin-bottom:24px}
  .auth .field{margin-bottom:14px}
  .auth label{display:block;font-size:12px;color:var(--muted);font-weight:700;margin-bottom:7px}
  .auth input{width:100%;background:var(--raised);border:1px solid var(--line2);border-radius:11px;color:var(--txt);padding:12px 14px;outline:none;transition:.13s}
  .auth input:focus{border-color:var(--brand)}
  .auth .go{width:100%;height:46px;border-radius:11px;background:var(--brand);color:#fff;font-weight:800;font-size:15px;margin-top:8px;transition:.13s}
  .auth .go:hover{filter:brightness(1.12)}
  .auth .go:disabled{opacity:.6;cursor:default}
  .auth .switch{text-align:center;margin-top:18px;color:var(--muted);font-size:13px}
  .auth .switch b{color:var(--brand);cursor:pointer;font-weight:800}
  .auth .err{background:var(--danger-dim);border:1px solid #f2c5c5;color:#b22b2b;border-radius:10px;padding:10px 12px;font-size:12.5px;margin-bottom:14px;display:none}
  .auth .err.show{display:block}

  /* ---------- Top bar ---------- */
  .topbar{display:flex;align-items:center;gap:16px;padding:14px 22px;border-bottom:1px solid #2C3D5E;background:var(--brand);position:sticky;top:0;z-index:40}
  .topbar .brand h1{color:#fff}
  .topbar .brand .sub{color:#A9B6D0}
  .topbar .search{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.18)}
  .topbar .search input{color:#fff}
  .topbar .search input::placeholder{color:#9FB0CE}
  .topbar .btn.ghost{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2);color:#fff}
  .topbar .btn.ghost:hover{background:rgba(255,255,255,.18)}
  .topbar .btn.primary{background:#fff;color:var(--brand)}
  .topbar .btn.primary:hover{filter:brightness(.96)}
  .brand{display:flex;align-items:center;gap:12px}
  .brand .logo{height:40px;width:auto;flex:none;display:flex;align-items:center}
  .brand .logo img{height:40px;width:auto;object-fit:contain}
  .brand h1{font-size:18px;font-weight:900;letter-spacing:-.3px;line-height:1}
  .brand .sub{font-size:11.5px;color:var(--muted);margin-top:3px}
  .spacer{flex:1}
  .search{display:flex;align-items:center;gap:8px;background:var(--raised);border:1px solid var(--line);border-radius:10px;padding:0 12px;height:40px;min-width:200px}
  .search input{background:none;border:none;color:var(--txt);width:100%;outline:none}
  .search input::placeholder{color:var(--faint)}
  .btn{height:40px;padding:0 16px;border-radius:10px;font-weight:700;font-size:13.5px;display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:var(--raised);transition:.15s}
  .btn:hover{border-color:var(--line2);background:var(--raised2)}
  .btn.primary{background:var(--brand);color:#fff;border:none;box-shadow:0 4px 14px rgba(27,42,74,.22)}
  .btn.primary:hover{filter:brightness(1.12)}
  .btn.ghost{background:none;border-color:var(--line)}

  .shell{display:flex;min-height:calc(100vh - 71px)}
  .side{width:248px;flex:none;border-left:1px solid #24344F;padding:20px 16px;display:flex;flex-direction:column;gap:6px;background:var(--brand)}
  .side .nav-group-label{color:#7E8DAC}
  .side .nav-item{color:#B7C2DA}
  .side .nav-item:hover{background:rgba(255,255,255,.08);color:#fff}
  .side .nav-item.active{background:rgba(255,255,255,.14);color:#fff}
  .side .nav-item .count{background:rgba(255,255,255,.14);color:#D5DEEE}
  .side .tnav-link{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.16);color:#B7C2DA}
  .side .tnav-link:hover{background:rgba(255,255,255,.16);border-color:rgba(255,255,255,.3);color:#fff}
  .side .me-card{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.14)}
  .side .me-card #meName{color:#fff!important}
  .side .me-card #meRole{color:#9FB0CE!important}
  .side .me-card .out{color:#9FB0CE}
  .side .me-card .out:hover{color:#FF9B9B}
  .nav-group-label{font-size:10.5px;color:var(--faint);font-weight:700;letter-spacing:.6px;margin:14px 8px 6px}
  .nav-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;color:var(--muted);font-weight:700;transition:.13s;width:100%;text-align:right}
  .nav-item .ico{width:18px;text-align:center;font-size:15px}
  .nav-item:hover{background:var(--raised);color:var(--txt)}
  .nav-item.active{background:var(--brand-dim);color:var(--brand)}
  .nav-item .count{margin-inline-start:auto;font-size:11px;background:var(--raised2);color:var(--muted);border-radius:20px;padding:1px 8px}
  .me-card{margin-top:auto;background:var(--raised);border:1px solid var(--line);border-radius:12px;padding:12px;display:flex;gap:10px;align-items:center}
  .me-card .out{margin-inline-start:auto;font-size:11px;color:var(--faint);cursor:pointer}
  .me-card .out:hover{color:var(--danger)}

  .main{flex:1;padding:24px 28px;overflow:auto;min-width:0}
  .page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:20px;flex-wrap:wrap}
  .page-title{font-size:24px;font-weight:900;letter-spacing:-.5px}
  .page-sub{color:var(--muted);font-size:13px;margin-top:3px}

  .stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:22px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px}
  .stat .k{font-size:11.5px;color:var(--muted);font-weight:700;display:flex;align-items:center;gap:7px}
  .stat .v{font-size:30px;font-weight:900;margin-top:6px;line-height:1}
  .stat .bar{height:4px;border-radius:4px;background:var(--raised2);margin-top:12px;overflow:hidden}
  .stat .bar>i{display:block;height:100%;border-radius:4px}
  .dot{width:8px;height:8px;border-radius:50%;flex:none}

  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;align-items:center}
  .chip{padding:7px 13px;border-radius:20px;border:1px solid var(--line);background:var(--panel);color:var(--muted);font-weight:700;font-size:12.5px;transition:.13s}
  .chip:hover{border-color:var(--line2);color:var(--txt)}
  .chip.on{background:var(--brand);color:#fff;border-color:var(--brand)}
  .filters .sep{width:1px;height:22px;background:var(--line);margin:0 4px}

  .board{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;align-items:start}
  .col{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:12px;min-height:120px;transition:.13s}
  .col.drop{outline:2px dashed var(--brand);outline-offset:-4px;background:#1b1d22}
  .col-head{display:flex;align-items:center;gap:9px;padding:4px 6px 12px;font-weight:800;font-size:13px}
  .col-head .num{margin-inline-start:auto;background:var(--raised2);color:var(--muted);border-radius:20px;padding:1px 9px;font-size:11px}
  .card{background:var(--raised);border:1px solid var(--line2);border-radius:var(--radius-s);padding:12px;margin-bottom:10px;cursor:grab;transition:.13s;position:relative}
  .card:hover{border-color:var(--brand);transform:translateY(-1px);box-shadow:var(--shadow)}
  .card.dragging{opacity:.4}
  .card .ttl{font-weight:700;font-size:14px;line-height:1.4;margin-bottom:9px}
  .card .meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .tag{font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:6px;display:inline-flex;align-items:center;gap:5px}
  .tag.cat{background:var(--raised2);color:var(--txt)}
  .tag.plat{background:var(--raised2);color:var(--muted)}
  .card .foot{display:flex;align-items:center;gap:8px;margin-top:11px;padding-top:10px;border-top:1px solid var(--line)}
  .ava{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;font-size:11px;font-weight:800;color:#0E1014;flex:none}
  .who{font-size:11.5px;color:var(--muted);font-weight:700}
  .due{margin-inline-start:auto;font-size:11px;color:var(--muted);font-weight:700;display:flex;align-items:center;gap:4px}
  .due.late{color:var(--danger)}
  .teacher-pill{font-size:10.5px;color:var(--brand);font-weight:700;margin-bottom:7px;display:flex;align-items:center;gap:5px}

  .grid3{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
  .member{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px}
  .member .top{display:flex;align-items:center;gap:12px;margin-bottom:16px}
  .member .name{font-weight:800;font-size:16px}
  .member .role{font-size:11.5px;color:var(--muted)}
  .kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
  .kpi{background:var(--raised);border:1px solid var(--line);border-radius:10px;padding:10px;text-align:center}
  .kpi .n{font-size:22px;font-weight:900}
  .kpi .l{font-size:10.5px;color:var(--muted);font-weight:700;margin-top:2px}
  .wl{margin-top:6px}
  .wl .lbl{display:flex;justify-content:space-between;font-size:11.5px;color:var(--muted);font-weight:700;margin-bottom:6px}
  .wl .track{height:8px;background:var(--raised2);border-radius:6px;overflow:hidden;display:flex}
  .wl .track i{height:100%}
  .teach-list{display:flex;gap:6px;flex-wrap:wrap;margin-top:14px}
  .teach-list .t{font-size:11px;background:var(--raised);border:1px solid var(--line);border-radius:7px;padding:4px 9px;color:var(--muted);font-weight:700}
  .role-badge{font-size:10px;font-weight:800;padding:2px 8px;border-radius:6px;background:var(--brand-dim);color:var(--brand);cursor:pointer}

  /* teacher nav row with link button */
  .tnav-row{display:flex;align-items:center;gap:4px}
  .tnav-row .nav-item{flex:1}
  .tnav-link{width:30px;height:30px;flex:none;border-radius:8px;display:grid;place-items:center;color:var(--muted);border:1px solid var(--line);background:var(--panel);font-size:13px}
  .tnav-link:hover{color:var(--brand);border-color:var(--brand);background:var(--brand-dim)}

  /* link tree */
  .lt-wrap{max-width:560px}
  .lt-card{display:flex;align-items:center;gap:14px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;margin-bottom:12px;text-decoration:none;color:var(--txt);transition:.14s}
  .lt-card:hover{border-color:var(--brand);transform:translateY(-1px);box-shadow:var(--shadow)}
  .lt-ico{width:46px;height:46px;border-radius:12px;flex:none;display:grid;place-items:center;font-size:20px;color:#fff}
  .lt-card .nm{font-weight:800;font-size:15px}
  .lt-card .sub{font-size:11.5px;color:var(--muted);margin-top:2px}
  .lt-card .arr{margin-inline-start:auto;color:var(--faint);font-size:20px}
  .lt-empty{background:var(--panel);border:1px dashed var(--line2);border-radius:var(--radius);padding:18px;color:var(--muted);text-align:center;font-size:13px;margin-bottom:12px}

  /* leaderboard + tracking */
  .miss-badge{font-size:10px;font-weight:800;padding:1px 7px;border-radius:20px;background:var(--danger-dim);color:var(--danger);margin-inline-start:6px}
  .rank-row{display:flex;align-items:center;gap:14px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px 18px;margin-bottom:10px}
  .rank-row.top{border-color:var(--brand);box-shadow:var(--shadow)}
  .rank-pos{width:38px;height:38px;flex:none;border-radius:10px;display:grid;place-items:center;font-weight:900;font-size:16px;background:var(--raised2);color:var(--muted)}
  .rank-pos.g1{background:#FFE9B0;color:#8a6a12}.rank-pos.g2{background:#E3E8EF;color:#5a6573}.rank-pos.g3{background:#F4D9C2;color:#8a5a30}
  .rank-main{flex:1;min-width:0}
  .rank-main .nm{font-weight:800;font-size:15px}
  .rank-main .sub{font-size:11.5px;color:var(--muted);margin-top:3px;display:flex;gap:12px;flex-wrap:wrap}
  .rank-score{text-align:center;flex:none}
  .rank-score .n{font-size:26px;font-weight:900;line-height:1}
  .rank-score .l{font-size:10px;color:var(--muted);font-weight:700}
  .seg-tabs{display:inline-flex;background:var(--raised);border:1px solid var(--line2);border-radius:10px;padding:3px;gap:3px;margin-bottom:18px}
  .seg-tabs button{padding:8px 16px;border-radius:8px;font-weight:700;font-size:13px;color:var(--muted)}
  .seg-tabs button.on{background:var(--brand);color:#fff}
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:12px;max-width:280px}
  .cal .d{aspect-ratio:1;border-radius:6px;display:grid;place-items:center;font-size:10px;font-weight:700}
  .cal .d.ok{background:#DDF3E6;color:#1d8a52}
  .cal .d.miss{background:var(--danger-dim);color:var(--danger)}
  .cal .d.rest{background:var(--raised2);color:var(--faint)}
  .cal .d.future{background:transparent;color:var(--faint)}

  .plan-cal{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:16px}
  .pc-head{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:12px;font-size:14px}
  .pc-leg{font-size:11.5px;color:var(--muted);font-weight:600}
  .pcal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .pcal .pd{aspect-ratio:1;border-radius:8px;display:grid;place-items:center;font-size:13px;font-weight:700;position:relative;background:var(--raised2);color:var(--muted)}
  .pcal .pd.lbl{background:transparent;color:var(--faint);font-size:11px}
  .pcal .pd.ok{background:#DDF3E6;color:#1d8a52;cursor:pointer}
  .pcal .pd.ok:hover{outline:2px solid #1d8a52}
  .pcal .pd.fixable{cursor:pointer}
  .pcal .pd.fixable:hover{outline:2px dashed var(--brand)}
  .pcal .pd.miss{background:var(--danger-dim);color:var(--danger)}
  .pcal .pd.rest{background:var(--raised2);color:var(--faint)}
  .pcal .pd.fut{background:transparent;color:var(--faint)}
  .pcal .pd.tdy{outline:2px solid var(--brand);outline-offset:-2px}
  .pcal .pd .pdc{position:absolute;top:2px;left:3px;font-size:9px;background:#1d8a52;color:#fff;border-radius:8px;padding:0 4px}

  .pubq{display:flex;gap:8px}
  .pubq .pdq{flex:1;padding:12px 6px;border-radius:10px;border:1.5px solid var(--line);background:var(--raised2);font-weight:700;font-size:13px;cursor:pointer;color:var(--txt);line-height:1.3}
  .pubq .pdq.on{border-color:var(--brand);background:var(--brand);color:#fff}

  .feed{max-width:780px}
  .empty{text-align:center;color:var(--muted);padding:60px 20px}
  .empty .big{font-size:40px;margin-bottom:12px;opacity:.5}
  .report{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:22px;max-width:780px}
  .report h3{font-size:16px;margin-bottom:14px}
  .rrow{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--line)}
  .rrow:last-child{border:none}.rrow .v{font-weight:800}

  .overlay{position:fixed;inset:0;background:rgba(5,6,8,.7);backdrop-filter:blur(4px);z-index:90;display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow:auto}
  .overlay.show{display:flex}
  .modal{background:var(--panel);border:1px solid var(--line2);border-radius:18px;width:560px;max-width:100%;box-shadow:var(--shadow);overflow:hidden}
  .modal .mh{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--line)}
  .modal .mh h3{font-size:17px;font-weight:900}
  .modal .mb{padding:22px;display:flex;flex-direction:column;gap:16px}
  .field label{display:block;font-size:12px;color:var(--muted);font-weight:700;margin-bottom:7px}
  .field input,.field select,.field textarea{width:100%;background:var(--raised);border:1px solid var(--line2);border-radius:10px;color:var(--txt);padding:11px 13px;outline:none;transition:.13s}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--brand)}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .mf{display:flex;gap:10px;padding:16px 22px;border-top:1px solid var(--line)}
  .x{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;color:var(--muted);font-size:18px;border:1px solid var(--line)}
  .x:hover{background:var(--raised2);color:var(--txt)}
  .seg{display:flex;background:var(--raised);border:1px solid var(--line2);border-radius:10px;padding:3px;gap:3px}
  .seg button{flex:1;padding:9px;border-radius:8px;font-weight:700;font-size:12.5px;color:var(--muted);transition:.13s}
  .seg button.on{background:var(--raised2);color:var(--txt)}
  .comments{display:flex;flex-direction:column;gap:10px;max-height:170px;overflow:auto}
  .cmt{background:var(--raised);border:1px solid var(--line);border-radius:10px;padding:10px 12px}
  .cmt .h{display:flex;gap:8px;align-items:center;margin-bottom:5px}.cmt .h b{font-size:12.5px}.cmt .h span{font-size:10.5px;color:var(--faint);margin-inline-start:auto}
  .danger-link{color:var(--danger);font-weight:700;font-size:12.5px}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ready);color:#04150c;font-weight:800;padding:12px 22px;border-radius:12px;z-index:120;opacity:0;transition:.25s;box-shadow:var(--shadow)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.bad{background:var(--danger);color:#fff}
  .hidden{display:none!important}
  .loader{min-height:100vh;display:grid;place-items:center;color:var(--muted)}
  .spin{width:34px;height:34px;border:3px solid var(--line2);border-top-color:var(--brand);border-radius:50%;animation:sp 1s linear infinite;margin:0 auto 14px}
  @keyframes sp{to{transform:rotate(360deg)}}

  .menu-btn{display:none;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;width:42px;height:42px;border-radius:10px;font-size:20px;flex:none;cursor:pointer}
  .bell{position:relative;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;width:42px;height:42px;border-radius:10px;font-size:18px;flex:none;cursor:pointer}
  .nbadge{position:absolute;top:-6px;left:-6px;background:#FF4D4D;color:#fff;font-size:10px;font-weight:800;min-width:18px;height:18px;border-radius:20px;display:grid;place-items:center;padding:0 4px;border:2px solid var(--brand)}

const CATS=['كوميك','ريلز','ديزاين','كاروسيل','برومو'];
// ===== قواعد الالتزام الأسبوعي (لكل الحسابات) =====
const COMPLIANCE_RULES=[
  {cat:'كوميك',  type:'max', n:2, label:'الكوميكس', ico:'😂', msg:'الكوميكس مش المفروض تزيد عن ٢ في الأسبوع'},

];
// الأسبوع الحالي: السبت → الجمعة
function weekStart(d){ d=d?new Date(d):new Date(); const dow=d.getDay(); /*0=أحد..6=سبت*/ const back=(dow+1)%7; const s=new Date(d); s.setDate(d.getDate()-back); s.setHours(0,0,0,0); return s; }
function weekEnd(d){ const s=weekStart(d); const e=new Date(s); e.setDate(s.getDate()+6); e.setHours(23,59,59,999); return e; }
// عدّ بوستات مدرّس حسب النوع في فترة (من publish_log مربوط بالكارت لمعرفة الـcategory)
function teacherCatCounts(teacherId, fromYmd, toYmd){
  const counts={}; CATS.forEach(c=>counts[c]=0); counts['غير مصنّف']=0;
  PUBLOG.filter(l=>l.teacher_id===teacherId && l.pub_date>=fromYmd && l.pub_date<=toYmd).forEach(l=>{
    const card=CARDS.find(x=>x.id===l.card_id);
    const cat=card&&card.category?card.category:'غير مصنّف';
    if(counts[cat]===undefined)counts[cat]=0; counts[cat]++;
  });
  return counts;
}
// فحص التزام مدرّس في أسبوع معيّن — ذكي حسب اليوم
// لكل قاعدة بنرجّع status: 'ok' | 'over' (زيادة) | 'under' (نقص فعلي آخر الأسبوع) | 'pending' (لسه بيكمّل)
function teacherWeekCompliance(teacherId, refDate){
  const ws=weekStart(refDate), we=weekEnd(refDate);
  const fromYmd=ymd(ws), toYmd=ymd(we);
  const counts=teacherCatCounts(teacherId, fromYmd, toYmd);
  // كام يوم عدّى من الأسبوع وكام فاضل (بالنسبة للنهاردة)
  const today=new Date(); today.setHours(23,59,59,999);
  const isPast = we < new Date(new Date().setHours(0,0,0,0)); // أسبوع خلص خالص
  const dayIdx = Math.min(6, Math.max(0, Math.floor((today - ws)/864e5))); // 0..6 (النهاردة رقم كام في الأسبوع)
  const daysLeft = isPast ? 0 : Math.max(0, 6 - dayIdx); // أيام فاضلة في الأسبوع
  // «آخر الأسبوع» = الأسبوع خلص، أو فاضل يوم واحد أو أقل
  const weekEnding = isPast || daysLeft<=1;
  const rules=COMPLIANCE_RULES.map(r=>{
    const got=counts[r.cat]||0;
    let status='ok';
    if(r.type==='max'){
      if(got>r.n) status='over';                       // سقف: تحذير أي وقت
    } else { // min
      if(got>=r.n) status='ok';
      else if(weekEnding) status='under';              // نقص فعلي: بس آخر الأسبوع
      else status='pending';                           // لسه بيكمّل
    }
    return {rule:r, got, status, daysLeft};
  });
  // «issues» = مشاكل حقيقية بس (over أو under) — الـpending مش مشكلة
  const issues=rules.filter(x=>x.status==='over'||x.status==='under')
                    .map(x=>({rule:x.rule, count:x.got, kind:x.status}));
  return {counts, rules, issues, from:fromYmd, to:toYmd, daysLeft, weekEnding, isPast};
}

      if(error) throw error;

function translateErr(m){
  if(/Invalid login/i.test(m)) return 'الإيميل أو الباسوورد غلط';
  if(/already registered/i.test(m)) return 'الإيميل ده مسجّل قبل كده — سجّل دخول';
  if(/at least 6/i.test(m)) return 'الباسوورد لازم ٦ حروف على الأقل';
  if(/confirm/i.test(m)) return 'محتاج تأكيد الإيميل — افتح رسالة التأكيد على إيميلك';
  return m;
}

let loadedAll=false; // بقينا حمّلنا كل التاريخ؟
function monthsBackISO(n){const d=new Date();d.setMonth(d.getMonth()-n);d.setDate(1);d.setHours(0,0,0,0);return d.toISOString();}
function monthsBackDate(n){const d=new Date();d.setMonth(d.getMonth()-n);d.setDate(1);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-01';}
async function reload(){
  // الجداول الصغيرة بالكامل
  const small=await Promise.all([
    sb.from('profiles').select('*'),
    sb.from('teachers').select('*'),
    sb.from('notifications').select('*').eq('user_id',ME.id).order('created_at',{ascending:false}).limit(50),
    sb.from('monthly_reports').select('*'),
    sb.from('app_settings').select('*').eq('key','announcement'),
    sb.from('teacher_reviews').select('*'),
  ]);
  PROFILES=small[0].data||[]; TEACHERS=small[1].data||[]; NOTIFS=small[2].data||[]; REPORTS=small[3].data||[];
  ANNOUNCE=(small[4].data&&small[4].data[0])?small[4].data[0].value:null;
  TREVIEWS=small[5].data||[];

  if(loadedAll){ await loadAllCards(); return; }

  // الكروت: آخر ٣ شهور + أي كارت لسه مفتوح (مش منشور/مش خالص) مهما كان قديم
  const cutoff=monthsBackISO(3);
  const c=await sb.from('cards').select('*')
    .or(`created_at.gte.${cutoff},status.not.in.(published,done)`)
    .order('created_at',{ascending:false});
  CARDS=c.data||[];
  // الكومنتات للكروت المحمّلة بس
  const ids=CARDS.map(x=>x.id);
  if(ids.length){ const cm=await sb.from('comments').select('*').in('card_id',ids).order('created_at',{ascending:true}); COMMENTS=cm.data||[]; }
  else COMMENTS=[];
  // سجل النشر: آخر ٣ شهور (يكفي التقييم والشهر الحالي)
  const pl=await sb.from('publish_log').select('*').gte('pub_date',monthsBackDate(3));
  PUBLOG=pl.data||[];
}

  const [c,cm,pl]=await Promise.all([

// رفع صورة للتخزين وإرجاع اللينك العام
async function uploadAvatar(file,prefix){
  if(!file) return null;
  if(file.size>3*1024*1024){toast('الصورة كبيرة (أقصى ٣ ميجا)',true);return null;}
  const ext=(file.name.split('.').pop()||'jpg').toLowerCase();
  const path=`${prefix}-${Date.now()}.${ext}`;
  const {error}=await sb.storage.from('avatars').upload(path,file,{upsert:true,cacheControl:'3600'});
  if(error){toast(error.message,true);return null;}
  const {data}=sb.storage.from('avatars').getPublicUrl(path);

/* ---------- متابعة النشر اليومي + التقييم ---------- */
function monthStart(){const d=new Date();return new Date(d.getFullYear(),d.getMonth(),1);}
function ymd(d){const z=new Date(d.getTime()-d.getTimezoneOffset()*60000);return z.toISOString().slice(0,10);}
// الأيام المطلوب فيها نشر للمدرّس — من تاريخ الإسناد أو أول الشهر (الأحدث) لحد إمبارح
function monthStartOf(ym){ if(!ym) return monthStart(); const [y,m]=ym.split('-').map(Number); return new Date(y,m-1,1); }
function expectedDays(teacher, ym){
  ym = ym || ymNow();
  const days=[];
  let start=new Date(monthStartOf(ym));
  if(teacher.assigned_at){
    const a=new Date(teacher.assigned_at+'T00:00:00');
    if(a>start) start=a;
  }
  // نهاية الفترة: الشهر الحالي لحد إمبارح · الشهر الفايت = الشهر كله
  let end;
  if(ym===ymNow()){ end=new Date(); end.setHours(0,0,0,0); }
  else { const [y,m]=ym.split('-').map(Number); end=new Date(y,m,1); }
  let d=new Date(start);
  while(d < end){
    days.push(ymd(d));
    d=new Date(d); d.setDate(d.getDate()+1);
  }
  return days;
}
// مفتاح الأسبوع (بيبدأ السبت)
function weekKeySat(ds){const d=new Date(ds+'T00:00:00'); const off=(d.getDay()+1)%7; d.setDate(d.getDate()-off); return ymd(d);}
// أول يوم فايت في كل أسبوع بيتسامح (إجازة مرنة) — بنرجّع مجموعة الأيام المسموح بيها
function forgivenDaysForTeacher(teacherId, ym){
  const raw=missedDaysForTeacher(teacherId, ym).slice().sort();
  const seen=new Set(), forgiven=new Set();
  raw.forEach(ds=>{const wk=weekKeySat(ds); if(!seen.has(wk)){seen.add(wk); forgiven.add(ds);}}); // أول يوم فايت في الأسبوع
  return forgiven;
}
function teacherMissInfo(teacherId, ym){
  const raw=missedDaysForTeacher(teacherId, ym).length;
  const forgiven=forgivenDaysForTeacher(teacherId, ym).size;
  return {raw, forgiven, counted:Math.max(0,raw-forgiven)};
}
// أيام نزل فيها فعلاً نشر للمدرّس (من السجل، الشهر الحالي)
function publishedDays(teacherId, ym){
  ym = ym || ymNow();
  return new Set(PUBLOG.filter(l=>l.teacher_id===teacherId && (l.pub_date||'').slice(0,7)===ym).map(l=>l.pub_date));
}
// الأيام الفايتة لمدرّس (مطلوبة وما نزلش فيها)
function missedDaysForTeacher(teacherId, ym){
  const t=T(teacherId); if(!t||!t.id) return [];
  const done=publishedDays(teacherId, ym);
  return expectedDays(t, ym).filter(d=>!done.has(d));
}
// إجمالي بوستات الشهر لمدرّس
function teacherPosts(teacherId, ym){
  ym = ym || ymNow();
  return PUBLOG.filter(l=>l.teacher_id===teacherId && (l.pub_date||'').slice(0,7)===ym).length;
}
// إجمالي بوستات العضو الشهر (كل مدرّسينه)
function memberPosts(memberId, ym){
  ym = ym || ymNow();
  return PUBLOG.filter(l=>l.member_id===memberId && (l.pub_date||'').slice(0,7)===ym).length;
}
// إجمالي الأيام الفايتة المحتسبة (بعد سماح يوم/أسبوع) عبر كل مدرّسين العضو
function memberMissed(memberId, ym){
  return TEACHERS.filter(t=>t.owner_id===memberId).reduce((s,t)=>s+teacherMissInfo(t.id, ym).counted,0);
}
function memberForgiven(memberId, ym){
  return TEACHERS.filter(t=>t.owner_id===memberId).reduce((s,t)=>s+teacherMissInfo(t.id, ym).forgiven,0);
}
function memberTeacherBreakdown(memberId){
  return TEACHERS.filter(t=>t.owner_id===memberId).map(t=>({t, posts:teacherPosts(t.id), missed:teacherMissInfo(t.id).counted}));
}
// متوسط جودة شغل العضو الشهر ده (من تقييم القائد) — 0..1 أو null لو مفيش تقييمات
function memberQuality(memberId, ym){
  ym = ym || ymNow();
  const rated=CARDS.filter(c=>c.assignee_id===memberId && (c.kind||'post')==='post' && c.quality && (c.created_at||'').slice(0,7)===ym);
  if(!rated.length) return null;
  const avg=rated.reduce((s,c)=>s+c.quality,0)/rated.length;
  return (avg-1)/3; // سيء(1)=0 .. ممتاز(4)=1
}
// نمو الصفحة: مقارنة أرقام الشهر الحالي بالشهر اللي فات (%) — 0..1 أو null
// بيقيس التحسن النسبي مش الأرقام الخام عشان يكون عادل بين الصفحات الكبيرة والصغيرة
function memberGrowthScore(memberId, ym){
  const curYm=ym||ymNow(), prevYm=shiftYm(curYm,-1);
  const ts=TEACHERS.filter(t=>t.owner_id===memberId);
  const cur={f:0,v:0,e:0,n:0}, prev={f:0,v:0,e:0,n:0};
  ts.forEach(t=>{
    const c=getReport(t.id,curYm), p=getReport(t.id,prevYm);
    if(c&&p){cur.f+=c.new_followers||0;cur.v+=+c.views||0;cur.e+=+c.engagement||0;cur.n++;
              prev.f+=p.new_followers||0;prev.v+=+p.views||0;prev.e+=+p.engagement||0;prev.n++;}
  });
  if(!cur.n||!prev.n) return null;
  // نسبة التحسن لكل metric — 1.0 = نفس الشهر اللي فات، أكبر = أحسن
  const ratios=[];
  if(prev.f>0) ratios.push(cur.f/prev.f);
  if(prev.v>0) ratios.push(cur.v/prev.v);
  if(prev.e>0) ratios.push(cur.e/prev.e);
  if(!ratios.length) return null;
  const avg=ratios.reduce((a,b)=>a+b,0)/ratios.length;
  // نسبة=1 تعني ثبات (60%)، 1.5+ = ممتاز (100%)، 0.5- = سيء (0%)
  return Math.max(0,Math.min(1,(avg-0.5)/1.0));
}
// balance الأسابيع المكتملة في الشهر الحالي — 0..1 أو null
// الأسبوع "مكتمل" لو الجمعة بتاعته عدّت
function memberBalanceScore(memberId, ym){
  ym = ym || ymNow();
  const ts=TEACHERS.filter(t=>t.owner_id===memberId);
  if(!ts.length) return null;
  const mStart=monthStartOf(ym);
  const [yy,mm]=ym.split('-').map(Number);
  const monthEnd=new Date(yy,mm,1); // أول الشهر اللي بعده (حصري)
  const cutoff = (ym===ymNow()) ? new Date() : monthEnd; // الحالي: لحد النهاردة · الفايت: الشهر كله
  const completed=[];
  let d=new Date(mStart);
  while(d.getDay()!==6) d.setDate(d.getDate()+1);
  while(d<monthEnd){
    const fri=new Date(d); fri.setDate(d.getDate()+6);
    if(fri<cutoff) completed.push(new Date(d));
    d.setDate(d.getDate()+7);
  }
  if(!completed.length) return null;
  
  // تم إزالة شرط "الهروب" عشان الموظف ياخد صفر لو مش بيصنف
  const ok=completed.filter(sat=>ts.every(t=>teacherWeekCompliance(t.id,sat).issues.length===0)).length;
  return ok/completed.length;
}

// إدارة المدرّس: متوسط تقييمات القائد للشهر اللي فات لمدرّسي العضو — 0..1 أو null
function memberManageScore(memberId){
  const ym=shiftYm(ymNow(),-1); // الشهر اللي فات
  const ts=TEACHERS.filter(t=>t.owner_id===memberId);
  const vals=[];
  ts.forEach(t=>{const r=getTReview(t.id,ym); if(r){[r.reply,r.satis,r.comm,r.exec].forEach(v=>{if(v)vals.push(v);});}});
  if(!vals.length) return null;
  const avg=vals.reduce((a,b)=>a+b,0)/vals.length;
  return (avg-1)/2; // سيء(1)=0 .. كويس(3)=1
}

// نقطة تقييم العضو: انتظام 35٪ + balance 30٪ + جودة 20٪ + نمو الصفحة 15٪
function memberScore(memberId, ym){
  ym = ym || ymNow();
  const isCur = (ym===ymNow());
  const expectedRaw=TEACHERS.filter(t=>t.owner_id===memberId).reduce((s,t)=>s+expectedDays(t, ym).length,0);
  const forgiven=memberForgiven(memberId, ym);
  const expectedTotal=Math.max(0,expectedRaw-forgiven);
  const posts=memberPosts(memberId, ym);
  const missed=memberMissed(memberId, ym);
  const pScore=expectedTotal? Math.max(0,Math.min(1,(expectedTotal-missed)/expectedTotal)) : null; 
  
  // التوازن ملغي من الشهور اللي فاتت، وبيتحسب من الشهر الحالي بس
  const isWeekEnded = new Date().getDay() >= 5;
  let bScore = null;
  if (isCur) {
    bScore = (!isWeekEnded) ? null : memberBalanceScore(memberId, ym);
  }
  
  const qScore=memberQuality(memberId, ym);        
  const gScore=memberGrowthScore(memberId, ym);    
  
  if(pScore===null && bScore===null && qScore===null && gScore===null && posts<1)
    return {score:null, posts, missed, postingPct:null, balancePct:null, qualityPct:null, growthPct:null};
  
  const parts=[];
  if(pScore!==null) parts.push([pScore,.35]);
  if(bScore!==null) parts.push([bScore,.30]);
  if(qScore!==null) parts.push([qScore,.20]);
  if(gScore!==null) parts.push([gScore,.15]);
  
  const totW=parts.reduce((s,p)=>s+p[1],0)||1;
  const score=Math.round(parts.reduce((s,p)=>s+p[0]*p[1],0)/totW*100);
  
  return {score, posts, missed,
    postingPct: pScore===null?null:Math.round(pScore*100),
    balancePct: bScore===null?null:Math.round(bScore*100),
    qualityPct: qScore===null?null:Math.round(qScore*100),
    growthPct:  gScore===null?null:Math.round(gScore*100)};
}

async function recordPublish(card, dateStr){

  const day = dateStr || ymd(new Date());

}

  if(days===0)return'النهاردة';if(days<0)return'متأخر '+(-days)+'ي';if(days===1)return'بكرة';return'بعد '+days+'ي';}
function roleLabel(r){return r==='admin'?'أدمن':r==='manager'?'أكونت مانجر':r==='lead'?'تيم ليدر':'عضو';}
function roleRank(r){return r==='admin'?3:r==='manager'?2:r==='lead'?1:0;}
// كل الـ IDs اللي تحتي في الشجرة (بأي عمق) — مش بياخد نفسي
function descendantIds(){
  const out=new Set(); let frontier=[ME.id];
  while(frontier.length){
    const next=[];
    PROFILES.forEach(p=>{ if(p.lead_id && frontier.includes(p.lead_id) && !out.has(p.id)){ out.add(p.id); next.push(p.id);} });
    frontier=next;
  }
  return [...out];
}
// أبناء أي شخص (مش أنا بس)
function descendantsOf(personId){
  const out=new Set(); let frontier=[personId];
  while(frontier.length){
    const next=[];
    PROFILES.forEach(p=>{ if(p.lead_id && frontier.includes(p.lead_id) && !out.has(p.id)){ out.add(p.id); next.push(p.id);} });
    frontier=next;
  }
  return [...out];
}
// متوسط نقط المسؤولين المباشرين تحت شخص (الليدر→أعضاؤه، المانجر→التيم ليدرز اللي تحته)
function teamAvgScore(personId, ym){
  const kids=PROFILES.filter(p=>p.lead_id===personId && p.active!==false);
  const scores=kids.map(k=>scoreFor(k.id, ym).score).filter(s=>s!==null);
  if(!scores.length) return null;
  return Math.round(scores.reduce((a,b)=>a+b,0)/scores.length);
}
// نقطة أي شخص حسب دوره: عضو=شغله / ليدر=شغله50+فريقه50 / مانجر=فريقه100
function scoreFor(personId, ym){
  const u=U(personId);
  if(u.role==='member') return memberScore(personId, ym);
  if(u.role==='lead'){
    const own=memberScore(personId, ym).score, team=teamAvgScore(personId, ym);
    let score;
    if(own!==null && team!==null) score=Math.round(own*0.5+team*0.5);
    else if(own!==null) score=own;
    else if(team!==null) score=team;
    else score=null;
    return {score, own, team, role:'lead'};
  }
  if(u.role==='manager'){
    const team=teamAvgScore(personId, ym);
    return {score:team, own:null, team, role:'manager'};
  }
  return {score:null};
}

let _lastNavKey=null, _popping=false, _popInit=false;
function navSnapshot(){return {view,scopeTeacher,detailId,linkTeacher,boardKind};}
function syncHistory(){
  if(_popping) return;
  const snap=navSnapshot(), key=JSON.stringify(snap);
  if(key===_lastNavKey) return;
  if(_lastNavKey===null) history.replaceState(snap,''); else history.pushState(snap,'');
  _lastNavKey=key;
  if(!_popInit){ _popInit=true;
    window.addEventListener('popstate',e=>{
      _popping=true;
      const ov=document.getElementById('overlay'); if(ov) ov.classList.remove('show'); // اقفل أي نافذة مفتوحة

}

function planCalendar(t){
  const done=publishedDays(t.id);
  const forgiven=forgivenDaysForTeacher(t.id);
  const today=new Date(); today.setHours(0,0,0,0);
  const ms=monthStart();
  const assigned = t.assigned_at ? new Date(t.assigned_at+'T00:00:00') : null;
  const dayLabels=['ح','ن','ث','ر','خ','ج','س'];
  let cells=dayLabels.map(l=>`<div class="pd lbl">${l}</div>`).join('');
  for(let i=0;i<ms.getDay();i++) cells+='<div class="pd"></div>';
  let d=new Date(ms); const monthIdx=ms.getMonth();
  while(d.getMonth()===monthIdx){
    const ds=ymd(d), num=d.getDate();
    const isToday = ds===ymd(today);
    const canFix = ME.role!=='member';
    let cls='', click='', cnt=0;
    if(done.has(ds)){ cls='ok'; cnt=PUBLOG.filter(l=>l.teacher_id===t.id&&l.pub_date===ds).length; click=`onclick="openDayPosts('${t.id}','${ds}')"`; }
    else if(d>today) cls='fut';                       // أيام جاية
    else if(isToday){ cls='fut'; if(canFix) click=`onclick="openDayPosts('${t.id}','${ds}')"`; } // النهارده محايد
    else if(assigned && d<assigned) cls='fut';        // قبل ما المدرّس يتسند
    else if(forgiven.has(ds)){ cls='rest'; if(canFix) click=`onclick="openDayPosts('${t.id}','${ds}')"`; }
    else { cls='miss'; if(canFix) click=`onclick="openDayPosts('${t.id}','${ds}')"`; } // يوم فات
    cells+=`<div class="pd ${cls}${isToday?' tdy':''}${click&&cls!=='ok'?' fixable':''}" ${click}>${num}${cnt>1?`<span class="pdc">${cnt}</span>`:''}</div>`;
    d=new Date(d); d.setDate(d.getDate()+1);
  }
  const total=done.size, miss=teacherMissInfo(t.id).counted;
  return `<div class="plan-cal">
    <div class="pc-head"><b>📅 تقويم ${new Date().toLocaleDateString('ar-EG',{month:'long'})}</b>
      <span class="pc-leg">🟢 نزل ${total} · 🔴 فات ${miss} · ⚪ إجازة</span></div>
    <div class="pcal">${cells}</div>
    <div style="font-size:11px;color:var(--faint);margin-top:8px;text-align:center">${ME.role!=='member'?'دوس على أي يوم تضيف/تشيل نشر (تصحيح) · اليوم الأخضر تشوف اللي اتنشر فيه':'دوس على أي يوم أخضر تشوف اللي اتنشر فيه'}</div>
  </div>`;
}

let agendaScope='me';
function agendaView(){
  const canTeam = ME.role!=='member';
  const ids = (agendaScope==='team'&&canTeam) ? scopeIds() : [ME.id];
  // المهام النشطة (مش الخلصانة) المسندة للأشخاص دول
  let items=CARDS.filter(c=>ids.includes(c.assignee_id));
  items=items.filter(c=>(c.kind==='task')?c.status!=='done':c.status!=='published');
  const today=new Date(); today.setHours(0,0,0,0);
  const tomorrow=new Date(today); tomorrow.setDate(today.getDate()+1);
  const weekEnd=new Date(today); weekEnd.setDate(today.getDate()+7);
  const ymdT=ymd(today), ymdTom=ymd(tomorrow);
  const buckets={late:[],today:[],tom:[],week:[],later:[],none:[]};
  items.forEach(c=>{
    if(!c.due){buckets.none.push(c);return;}
    if(c.due<ymdT)buckets.late.push(c);
    else if(c.due===ymdT)buckets.today.push(c);
    else if(c.due===ymdTom)buckets.tom.push(c);
    else if(c.due<=ymd(weekEnd))buckets.week.push(c);
    else buckets.later.push(c);
  });
  // الترتيب: المستعجل الأول، بعده المهم، بعده العادي — وجوه كل مجموعة اللي وقته أطول الأول، وبعدين الميعاد
  const sortf=(a,b)=>{
    const pa=prio(a.priority).rank, pb=prio(b.priority).rank;
    if(pa!==pb)return pa-pb;
    const ea=a.effort||0, eb=b.effort||0;
    if(ea!==eb)return eb-ea;            // الأطول الأول
    return (a.due||'9').localeCompare(b.due||'9');
  };
  Object.values(buckets).forEach(arr=>arr.sort(sortf));
  const row=c=>{
    const a=U(c.assignee_id), isTask=c.kind==='task', t=isTask?null:T(c.teacher_id), p=prio(c.priority);
    const stName=(isTask?TASK_STATUSES:STATUSES).find(s=>s.id===c.status)?.name||'';
    return `<div class="rank-row" style="cursor:pointer;padding:11px 16px;${p.id!=='normal'?`border-inline-start:3px solid ${p.id==='urgent'?'var(--danger)':'#E0A93B'}`:''}" onclick="openCard('${c.id}')">
      <span style="font-size:18px;flex:none">${cardIcon(c)}</span>
      <div class="rank-main"><div class="nm" style="font-size:14px">${p.id!=='normal'?p.ico+' ':''}${esc(c.title)}</div>
        <div class="sub">${t?`<span>● ${t.name}</span>`:''}<span>👤 ${a.name}</span>${c.effort?`<span>⏱ ${effortName(c.effort)}</span>`:''}<span>${stName}</span></div></div>
      ${c.due?`<span class="due ${isLate(c)?'late':''}" style="flex:none">${isLate(c)?'⚠':'◔'} ${dueLabel(c.due)}</span>`:'<span style="color:var(--faint);font-size:11px">بدون ميعاد</span>'}</div>`;
  };
  const section=(title,arr,color,urgent)=>arr.length?`<div class="nav-group-label" style="color:${color||'var(--muted)'};margin:18px 4px 10px;font-size:13px;font-weight:800">${title} (${arr.length})</div>${arr.map(row).join('')}`:'';
  const toggle = canTeam?`<div class="seg-tabs" style="margin-bottom:18px">
      <button class="${agendaScope==='me'?'on':''}" onclick="agendaScope='me';render()">شغلي أنا</button>
      <button class="${agendaScope==='team'?'on':''}" onclick="agendaScope='team';render()">شغل الفريق</button></div>`:'';
  let body=section('⚠ متأخر',buckets.late,'var(--danger)')+section('النهارده',buckets.today,'var(--brand)')
    +section('بكرة',buckets.tom)+section('الأسبوع ده',buckets.week)+section('لاحقًا',buckets.later)+section('من غير ميعاد',buckets.none);
  if(!body) body=`<div class="empty"><div class="big">📅</div>مفيش شغل مفتوح${agendaScope==='team'?' للفريق':''} حاليًا. كله متسلّم 👏</div>`;
  return `<div class="page-head"><div><div class="page-title">الأجندة</div><div class="page-sub">شغلك مرتّب بالأيام — النهارده، بكرة، وبعدين</div></div></div>${toggle}${body}${olderBtn()}`;
}

function descendantsOf(rootId){
  const out=new Set(); let frontier=[rootId];
  while(frontier.length){const next=[];PROFILES.forEach(p=>{if(p.lead_id&&frontier.includes(p.lead_id)&&!out.has(p.id)){out.add(p.id);next.push(p.id);}});frontier=next;}
  return [...out];
}

  if(ME.role!=='lead'&&ME.role!=='manager'&&ME.role!=='admin') return '';

  const cards=membersWithTeachers.map(memberId=>{

    const teacherRows=mTeachers.map(t=>{
      const {counts,issues}=teacherWeekCompliance(t.id);
      const chips=COMPLIANCE_RULES.map(r=>{
        const got=counts[r.cat]||0;

      }).join('');

      return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border,#eee)">
        <div style="font-size:12.5px;color:var(--text);min-width:90px;font-weight:${hasBad?'700':'400'}">${esc(t.name)}</div>
        <div style="display:flex;gap:4px;flex-wrap:wrap">${chips}</div>
        ${hasBad?`<span style="margin-right:auto;font-size:11px;color:#E06A4F;font-weight:700;white-space:nowrap">⚠ ${issues.length} مخالفة</span>`:`<span style="margin-right:auto;font-size:11px;color:var(--ready)">✓</span>`}

    }).join('');

        ${statusBadge}

  }).join('');

  const totalBadMembers=membersWithTeachers.filter(id=>TEACHERS.filter(t=>t.owner_id===id).some(t=>teacherWeekCompliance(t.id).issues.length)).length;
  const okMembers=membersWithTeachers.length-totalBadMembers;

    <div style="font-size:13px;font-weight:800;margin-bottom:10px;display:flex;align-items:center;gap:10px">

      <span style="margin-right:auto;display:flex;gap:8px">

        ${totalBadMembers?`<span style="background:#E06A4F22;color:#E06A4F;font-size:11.5px;font-weight:700;padding:2px 10px;border-radius:12px">⚠ ${totalBadMembers} محتاج متابعة</span>`:''}
      </span>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px">${cards}</div>

}

function membersRank(ym){

  if(ME.role==='member'){
    const rows=rankGroup('member', ym);

function miniCalendar(t){
  const done=publishedDays(t.id);
  const forgiven=forgivenDaysForTeacher(t.id);
  const today=new Date(); today.setHours(0,0,0,0);
  const ms=monthStart();
  const canBackdate = ME.role==='admin'; // الأدمن بس يقدر يسجّل نشر فايت (تصحيح) — عشان محدش يأرّخ بوست على يوم فات
  const assigned = t.assigned_at ? new Date(t.assigned_at+'T00:00:00') : null;
  const dayLabels=['ح','ن','ث','ر','خ','ج','س'];
  let cells=dayLabels.map(l=>`<div class="d" style="background:none;color:var(--faint)">${l}</div>`).join('');
  for(let i=0;i<ms.getDay();i++) cells+='<div class="d future"></div>';
  let d=new Date(ms); const monthIdx=ms.getMonth();
  while(d.getMonth()===monthIdx){
    const ds=ymd(d); const num=d.getDate();
    const isToday = ds===ymd(today);
    let cls, click='', title='';
    if(done.has(ds)) cls='ok';                                  // نزل (حتى لو النهارده) = أخضر فورًا
    else if(d>today) cls='future';                             // أيام جاية
    else if(isToday) cls='future';                            // النهارده لسه ما عداش — محايد
    else if(assigned && d<assigned) cls='future';             // قبل الإسناد
    else if(forgiven.has(ds)){ cls='rest'; title='title="إجازة الأسبوع (مش محتسبة)"'; }
    else { cls='miss'; if(canBackdate){ click=`onclick="recordBackdate('${t.id}','${ds}')" style="cursor:pointer" title="سجّل نشر في اليوم ده"`; } }
    cells+=`<div class="d ${cls}" ${click} ${title}>${num}</div>`;
    d=new Date(d); d.setDate(d.getDate()+1);
  }
  return `<div class="cal">${cells}</div><div style="font-size:10.5px;color:var(--faint);margin-top:6px">🟢 نزل · 🔴 فات · ⚪ إجازة الأسبوع (أول يوم فايت بيتسامح)${canBackdate?' · دوس على يوم أحمر تسجّل فيه نشر':''}</div>`;
}

      <button class="btn" style="height:38px;flex:none" onclick="openAnnounceEditor()">✏ اكتب إعلان</button>

  const card=p=>{
    const roleOpts=[['member','عضو'],['lead','تيم ليدر'],['manager','أكونت مانجر']]
      .concat(ME.role==='admin'?[['admin','أدمن']]:[])

    // parent options depend on the role: member→leads, lead→managers, manager→(admin, none)

      const leads=PROFILES.filter(x=>x.role==='lead');

      parentSel=`<select onchange="setParent('${p.id}',this.value)"><option value="">— اختار الأكونت مانجر —</option>${mgrs.map(m=>`<option value="${m.id}" ${p.lead_id===m.id?'selected':''}>${m.name}</option>`).join('')}</select>`;

    const canManage = ME.role==='admin' || (ME.role==='manager' && descendantIds().includes(p.id));
    const actions = canManage ? `<div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">

        </select></div>
    </div>`).join('')}</div>`;
  }
  return head+body;

// مكتبة أفاتارات جاهزة (إيموجي على خلفيات بالهوية)
const AVATAR_PRESETS=['😎','🦅','⚽','📚','🔥','🎯','🚀','⭐','🧠','💡','🎨','📈','👑','🏆','⚡','🌟','🦁','🐺','🎬','🎓'];
const AVATAR_BGS=['#1B2A4A','#2563EB','#0EA5E9','#16A34A','#EA580C','#DC2626','#7C3AED','#DB2777','#0891B2','#CA8A04'];
function presetUrl(emoji,bg){
  const svg=`<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><rect width='200' height='200' fill='${bg}'/><text x='100' y='105' font-size='110' text-anchor='middle' dominant-baseline='central'>${emoji}</text></svg>`;
  return 'data:image/svg+xml;utf8,'+encodeURIComponent(svg);
}
// نافذة اختيار: رفع صورة / أفاتار جاهز / مسح
function photoPicker(title,currentUrl,onPick){
  document.getElementById('mTitle').textContent=title;
  const grid=AVATAR_PRESETS.map((e,i)=>{const bg=AVATAR_BGS[i%AVATAR_BGS.length];const u=presetUrl(e,bg);
    return `<span class="pp" data-url="${escAttr(u)}" style="cursor:pointer;width:52px;height:52px;border-radius:50%;overflow:hidden;display:inline-block;border:2px solid transparent"><img src="${u}" style="width:100%;height:100%"></span>`;}).join('');
  document.getElementById('mBody').innerHTML=`
    <div class="field"><label>ارفع صورة من جهازك</label><input type="file" id="pp_file" accept="image/*"></div>
    <div class="field"><label>أو اختار أفاتار جاهز</label><div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:6px">${grid}</div></div>`;
  document.getElementById('mFoot').innerHTML=`${currentUrl?'<button class="danger-link" id="pp_remove" style="background:none;border:none">🗑 شيل الصورة</button>':''}`;
  document.querySelectorAll('.pp').forEach(s=>s.onclick=()=>{closeModal();onPick(s.dataset.url);});
  document.getElementById('pp_file').onchange=async()=>{const f=document.getElementById('pp_file').files[0];if(!f)return;toast('بترفع…');const url=await uploadAvatar(f,'img-'+Date.now());if(url){closeModal();onPick(url);}};
  if(currentUrl)document.getElementById('pp_remove').onclick=()=>{closeModal();onPick(null);};
  document.getElementById('overlay').classList.add('show');
}

/* ---------- monthly reports 📊 ---------- */
function ymNow(){return ymd(new Date()).slice(0,7);}
function ymLabel(ym){const [y,m]=ym.split('-');const names=['يناير','فبراير','مارس','إبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];return names[+m-1]+' '+y;}
function shiftYm(ym,delta){const [y,m]=ym.split('-').map(Number);const d=new Date(y,m-1+delta,1);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function monthPosts(teacherId,ym){return PUBLOG.filter(l=>l.teacher_id===teacherId && (l.pub_date||'').slice(0,7)===ym).length;}
function getReport(teacherId,ym){return REPORTS.find(r=>r.teacher_id===teacherId && r.ym===ym);}
function fmtNum(n){n=+n||0;if(n>=1000000)return(n/1000000).toFixed(1).replace('.0','')+'m';return n>=1000?(n/1000).toFixed(1).replace('.0','')+'k':String(n);}// ===== قسم تنبيهات الالتزام الأسبوعي =====
function weekLabel(refDate){
  const s=weekStart(refDate), e=weekEnd(refDate);
  const f=d=>`${d.getDate()}/${d.getMonth()+1}`;
  return `${f(s)} → ${f(e)}`;
}
function complianceCard(t, refDate, showName){
  const cur=teacherWeekCompliance(t.id, refDate);
  const owner=U(t.owner_id);
  const COL={ok:'var(--ready)', over:'var(--doing)', under:'var(--danger)', pending:'var(--pub)'};
  const rows=cur.rules.map(x=>{
    const r=x.rule, col=COL[x.status];
    const pct=Math.max(6, Math.min(100, Math.round((x.got/r.n)*100)));
    let note;
    if(r.type==='max'){
      note = x.status==='over' ? `زادت (الحد ${r.n})` : `تمام (الحد الأقصى ${r.n})`;
    } else {
      note = x.status==='ok' ? `اكتمل ✓`
           : x.status==='under' ? `ناقص (المطلوب ${r.n})`
           : `لسه بيكمّل · باقي ${x.daysLeft} ${x.daysLeft===1?'يوم':'أيام'}`;
    }
    return `<div style="display:flex;align-items:center;gap:10px;margin-top:9px">
      <div style="width:74px;flex:none;font-size:11.5px;color:var(--muted)">${r.ico} ${r.label}</div>
      <div style="flex:1;height:8px;border-radius:6px;background:var(--brand-dim);overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${col};border-radius:6px;transition:.3s"></div>
      </div>
      <div style="flex:none;font-weight:900;font-size:14px;color:${col};min-width:30px;text-align:center">${x.got}<span style="font-size:10px;color:var(--faint);font-weight:600">/${r.n}</span></div>
      <div style="flex:none;font-size:10.5px;color:${col};min-width:96px;text-align:left">${note}</div>
    </div>`;
  }).join('');
  const nIssues=cur.issues.length;
  const ok=nIssues===0;
  const headBadge = ok
    ? `<span style="background:#23A66B22;color:var(--ready);font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px">✓ ملتزم</span>`
    : `<span style="background:#D6454522;color:var(--danger);font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px">${nIssues} ${nIssues===1?'مشكلة':'مشاكل'}</span>`;
  const prev=teacherWeekCompliance(t.id, new Date(weekStart(refDate).getTime()-864e5));
  const prevN=prev.issues.length;
  const prevChip = `<span style="font-size:10.5px;color:var(--faint)">الأسبوع اللي فات: ${prevN===0?'<span style=\"color:var(--ready)\">✓</span>':`<span style=\"color:var(--danger)\">${prevN} ${prevN===1?'مشكلة':'مشاكل'}</span>`}</span>`;
  const repeat = (!ok && prevN>0) ? ` <span style="font-size:10px;color:var(--danger);font-weight:800">· متكرّر ⚠️</span>` : '';
  return `<div class="rank-row" style="flex-direction:column;align-items:stretch;gap:6px;border-right:3px solid ${ok?'var(--ready)':'var(--danger)'}">
    <div style="display:flex;align-items:center;gap:10px">
      <span class="rank-pos">${avaT(t.id,34)}</span>
      <div class="rank-main"><div class="nm">${t.name}</div>
        <div class="sub">${showName&&owner.name?`<span>👤 ${owner.name}</span>`:''}${prevChip}${repeat}</div></div>
      ${headBadge}
    </div>
    <div style="padding:2px 2px 4px">${rows}</div>
  </div>`;
}
function complianceSection(refDate, myTeachers){
  if(!myTeachers.length) return '';
  const showName = ME.role==='lead'||ME.role==='manager'||ME.role==='admin';
  // رتّب: اللي عندهم مشاكل الأول
  const sorted=[...myTeachers].sort((a,b)=>teacherWeekCompliance(b.id,refDate).issues.length - teacherWeekCompliance(a.id,refDate).issues.length);
  const rows=sorted.map(t=>complianceCard(t, refDate, showName)).join('');
  const totalIssues=myTeachers.reduce((s,t)=>s+teacherWeekCompliance(t.id,refDate).issues.length,0);
  const badge = totalIssues? `<span style="background:var(--danger);color:#fff;border-radius:20px;padding:2px 10px;font-size:12px;font-weight:800">${totalIssues} تنبيه</span>` : `<span style="background:var(--ready);color:#fff;border-radius:20px;padding:2px 10px;font-size:12px;font-weight:800">الكل ملتزم ✓</span>`;
  return `<div style="margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <div class="nav-group-label" style="margin:0;font-size:13px;font-weight:800">🚦 الالتزام الأسبوعي — أسبوع ${weekLabel(refDate)}</div>
      ${badge}
    </div>
    <div style="font-size:11.5px;color:var(--faint);margin:0 4px 12px">القواعد الأسبوعية: 😂 كوميكس ٢ كحد أقصى · 🎬 ريلز ٢ على الأقل · 🎨 ديزاين ٢ على الأقل · «الحد الأدنى» بيتحاسب آخر الأسبوع (قبلها بيظهر «لسه بيكمّل»)</div>
    ${rows}`;
}

  if(!reportMonth)reportMonth=ymNow();

    ${ym!==ymNow()?`<button onclick="reportMonth='${ymNow()}';render()" style="width:auto;padding:0 14px;font-size:13px">الشهر ده</button>`:''}</div>`;

  // تنبيه: لو بيشوف شهر أقدم من المحمّل، عدد البوستات ممكن يكون ناقص لحد ما يحمّل الأقدم
  const oldMonth = !loadedAll && ym < monthsBackDate(3).slice(0,7);

  // ملخّص الموظفين (مجمّع)
  const members=PROFILES.filter(u=>ids.includes(u.id)&&u.role!=='admin'&&u.active!==false);
  const memberRows=members.map(m=>{
    const mts=TEACHERS.filter(t=>t.owner_id===m.id);
    if(!mts.length)return '';
    let f=0,v=0,e=0,posts=0,filed=0;
    mts.forEach(t=>{const r=getReport(t.id,ym);posts+=monthPosts(t.id,ym);if(r){f+=r.new_followers||0;v+=+r.views||0;e+=+r.engagement||0;filed++;}});
    return `<div class="rank-row"><span class="rank-pos">${avaP(m.id,34)}</span>
      <div class="rank-main"><div class="nm">${m.name}</div><div class="sub"><span>${mts.length} مدرّس</span><span>${filed}/${mts.length} تقرير اتسجّل</span><span>📤 ${posts} بوست</span></div></div>
      <div style="display:flex;gap:14px;text-align:center;flex:none">
        <div><div style="font-weight:800;font-size:15px">+${fmtNum(f)}</div><div style="font-size:10px;color:var(--faint)">متابعين</div></div>
        <div><div style="font-weight:800;font-size:15px">${fmtNum(v)}</div><div style="font-size:10px;color:var(--faint)">مشاهدات</div></div>
        <div><div style="font-weight:800;font-size:15px">${fmtNum(e)}</div><div style="font-size:10px;color:var(--faint)">تفاعل</div></div>
      </div></div>`;
  }).filter(Boolean).join('');

  // تقارير المدرّسين
  const teacherRows=myTeachers.map(t=>{
    const r=getReport(t.id,ym), posts=monthPosts(t.id,ym), can=canEditReport(t);
    return `<div class="rank-row" style="${r?'':'opacity:.85'}">
      <span class="rank-pos">${avaT(t.id,34)}</span>
      <div class="rank-main"><div class="nm">${t.name}</div>
        <div class="sub"><span>📤 ${posts} بوست</span>${r?`<span>+${fmtNum(r.new_followers)} متابع</span><span>👁 ${fmtNum(r.views)}</span><span>❤ ${fmtNum(r.engagement)}</span>${r.proof_link||r.proof_file?'<span>📎 إثبات</span>':''}`:'<span style="color:var(--danger)">لسه مفيش تقرير</span>'}</div></div>
      ${can?`<button class="btn" style="height:34px;flex:none" onclick="openReport('${t.id}')">${r?'تعديل':'＋ تقرير'}</button>`:''}</div>`;
  }).join('');

  return `<div class="page-head"><div><div class="page-title">التقارير الشهرية</div><div class="page-sub">إحصائيات فيسبوك لكل مدرّس + شغل السايت، مجمّعين في مكان واحد</div></div></div>
    <div style="background:var(--raised);border-radius:16px;padding:16px;margin-bottom:22px">
      <div class="week-nav" style="margin-bottom:14px">
        <button onclick="complianceWeek='cur';render()" class="${(complianceWeek||'cur')==='cur'?'':'ghost'}" style="width:auto;padding:0 14px;font-size:13px">الأسبوع الحالي</button>
        <button onclick="complianceWeek='prev';render()" class="${complianceWeek==='prev'?'':'ghost'}" style="width:auto;padding:0 14px;font-size:13px">الأسبوع اللي فات</button>
      </div>
      ${complianceSection((complianceWeek==='prev'?new Date(Date.now()-7*864e5):new Date()), myTeachers)||'<div class="lt-empty">مفيش مدرّسين في نطاقك.</div>'}
    </div>
    ${nav}
    ${oldNote}
    <div class="nav-group-label" style="margin:6px 4px 10px;font-size:13px;font-weight:800">📈 ملخّص الموظفين</div>
    ${memberRows||'<div class="lt-empty">مفيش موظفين بمدرّسين في نطاقك.</div>'}
    <div class="nav-group-label" style="margin:22px 4px 10px;font-size:13px;font-weight:800">🎓 تقارير المدرّسين</div>
    ${teacherRows||'<div class="lt-empty">مفيش مدرّسين في نطاقك.</div>'}`;
}
function canEditReport(t){return ME.role==='admin'||t.owner_id===ME.id||descendantIds().includes(t.owner_id);}

window.approveUser=async function(id){
  const role=document.getElementById('sr_'+id)?.value||'member';
  const {error}=await sb.from('profiles').update({approved:true, role, seen_role:null}).eq('id',id);
  if(error)return toast(error.message,true);
  await reload(); render(); toast('اتقبل الحساب ✓');
};
window.rejectUser=async function(id){
  if(!confirm('ترفض الحساب ده؟ مش هيقدر يدخل.'))return;
  const {error}=await sb.from('profiles').update({active:false}).eq('id',id);
  if(error)return toast(error.message,true);
  await reload(); render(); toast('اترفض الحساب');
};
window.backupNow=async function(btn){
  if(ME.role!=='admin')return;
  const old=btn?btn.textContent:''; if(btn){btn.disabled=true;btn.textContent='بيجهّز…';}
  try{
    // نجيب كل البيانات كاملة من السيرفر (مش المحمّل بس) عشان النسخة تبقى كاملة
    const [p,t,c,cm,pl,nt,rp]=await Promise.all([
      sb.from('profiles').select('*'),
      sb.from('teachers').select('*'),
      sb.from('cards').select('*'),
      sb.from('comments').select('*'),
      sb.from('publish_log').select('*'),
      sb.from('notifications').select('*'),
      sb.from('monthly_reports').select('*'),
    ]);
    const dump={
      _app:'A to Z — بورد المحتوى',
      _backup_date:new Date().toISOString(),
      profiles:p.data||[], teachers:t.data||[], cards:c.data||[],
      comments:cm.data||[], publish_log:pl.data||[], notifications:nt.data||[], monthly_reports:rp.data||[],
    };
    const counts=`${dump.cards.length} كارت · ${dump.teachers.length} مدرّس · ${dump.profiles.length} حساب · ${dump.monthly_reports.length} تقرير`;
    const blob=new Blob([JSON.stringify(dump,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    const d=new Date(), ds=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    a.href=url; a.download=`atoz-backup-${ds}.json`; document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
    toast('اتنزّلت النسخة ✓ ('+counts+')');
  }catch(e){ toast('حصل خطأ في النسخة: '+(e.message||e),true); }
  if(btn){btn.disabled=false;btn.textContent=old;}
};

    <div class="field"><label>ملاحظات (اختياري)</label><input id="r_notes" value="${r?escAttr(r.notes||''):''}" placeholder="أي ملاحظة عن أداء الشهر…"></div>`;
  let acts=`<button class="btn primary" id="r_save">${r?'حفظ':'إضافة التقرير'}</button>`;
  if(r)acts+=`<button class="danger-link" id="r_del" style="margin-inline-start:auto;background:none;border:none">مسح</button>`;
  document.getElementById('mFoot').innerHTML=acts;
  document.getElementById('r_save').onclick=async()=>{
    let proofFile=r?r.proof_file:null;
    const f=document.getElementById('r_file').files[0];
    const linkVal=normUrl(val('r_link'));
    // الإثبات إجباري: لازم لينك أو ملف (قديم أو جديد)
    if(!linkVal && !f && !proofFile){toast('لازم تحط إثبات: لينك أو ملف',true);return;}
    if(f){toast('بيرفع الملف…');const url=await uploadReportFile(f,teacherId,ym);if(!url){return;}proofFile=url;}
    const data={teacher_id:teacherId,ym,new_followers:+val('r_foll')||0,views:+val('r_views')||0,engagement:+val('r_eng')||0,
      proof_link:linkVal||null,proof_file:proofFile||null,notes:val('r_notes')||null,created_by:ME.id,updated_at:new Date().toISOString()};
    const {error}=await sb.from('monthly_reports').upsert(data,{onConflict:'teacher_id,ym'});
    if(error)return toast(error.message,true);
    await reload();closeModal();render();toast('اتسجّل التقرير');
  };
  if(r)document.getElementById('r_del').onclick=async()=>{if(confirm('تمسح التقرير؟')){await sb.from('monthly_reports').delete().eq('id',r.id);await reload();closeModal();render();toast('اتمسح');}};
  document.getElementById('overlay').classList.add('show');
};
async function uploadReportFile(file,teacherId,ym){
  if(file.size>5*1024*1024){toast('الملف كبير (أقصى ٥ ميجا)',true);return null;}
  const ext=(file.name.split('.').pop()||'pdf').toLowerCase();
  const path=`${teacherId}-${ym}-${Date.now()}.${ext}`;
  const {error}=await sb.storage.from('reports').upload(path,file,{upsert:true});
  if(error){toast('مفيش مكان تخزين للتقارير — استخدم اللينك بدل الملف',true);return null;}
  return sb.storage.from('reports').getPublicUrl(path).data.publicUrl;
}

function guideExtra(){
  const isLeader = ME.role!=='member';
  const sec=(title)=>`<div style="font-weight:900;font-size:14px;margin:18px 0 8px;color:var(--brand)">${title}</div>`;
  const step=(t)=>`<div style="display:flex;gap:8px;font-size:13px;color:var(--muted);line-height:1.6;padding:3px 0"><span style="color:var(--ready);flex:none">●</span><div>${t}</div></div>`;
  const qa=(q,a)=>`<div style="padding:9px 0;border-bottom:1px solid var(--line)"><div style="font-weight:800;font-size:13.5px">${q}</div><div style="color:var(--muted);font-size:13px;line-height:1.6;margin-top:3px">${a}</div></div>`;

  // خطوات عملية
  let howto = sec('🚀 خطوات سريعة');
  howto += `<div style="font-weight:800;font-size:13px;margin:6px 0 2px">تنزّل بوست إزاي</div>`
    + step('دوس «＋ بوست جديد» فوق.')
    + step('اكتب العنوان، اختار المدرّس، التصنيف (كوميك/ريلز/ديزاين…)، والأولوية والمدة.')
    + step('وانت بتشتغل حرّك الكارت: فكرة ← قيد العمل، ولما يخلص حرّكه لـ «محتاج مراجعة».')
    + (isLeader ? step('بعد المراجعة، حرّكه لـ «جاهز للنشر»، ولما ينزل فعلاً حرّكه لـ «اتنشر».') : step('القائد هو اللي يراجع ويوافق ويحرّكه لـ «جاهز» و«اتنشر».'));
  howto += `<div style="font-weight:800;font-size:13px;margin:10px 0 2px">تعمل تاسك إزاي</div>`
    + step('دوس «＋»، وفي النافذة بدّل النوع لـ «تاسك».')
    + step('اختار نوعها (طلب ديزاين، خطة…)، المسؤول، والمدرّسين اللي بتخصّهم.')
    + step('التاسكات مش بتتحاسب في تقييمك — دي شغل مساعد بس.');
  if(isLeader){
    howto += `<div style="font-weight:800;font-size:13px;margin:10px 0 2px">تسجّل تقرير شهري إزاي</div>`
      + step('ادخل «التقارير الشهرية»، اختار الشهر، ودوس «＋ تقرير» جنب المدرّس.')
      + step('دخّل متابعين جداد + مشاهدات + تفاعل، وحط إثبات (لينك أو صورة) — الإثبات إجباري.');
  }

  // التقييم بالبلدي
  let scoring='';
  scoring = sec('⭐ التقييم بيتحسب إزاي (بالبلدي)')
      + step('<b>الانتظام في النزول ٣٥٪:</b> إنك بتنزّل لمدرّسينك بانتظام كل يوم (أول يوم فايت في الأسبوع بيتسامح).')
      + step('<b>التوازن ٣٠٪:</b> إنك ملتزم بقواعد الأنواع أسبوعيًا — الكوميكس مش أكتر من ٢، الريلز ٢ على الأقل، الديزاين ٢ على الأقل.')
      + step('<b>جودة الشغل ٢٠٪:</b> تقييم القائد لأفكارك وشغلك (سيء/عادي/كويس/ممتاز) على كل بوست.')
      + step('<b>نمو الصفحة ١٥٪:</b> تحسّن أرقام صفحات مدرّسينك (متابعين/مشاهدات/تفاعل) مقارنة بالشهر اللي فات.')
      + step('<b>عادل:</b> أي جزء القائد ماقيّمهوش، مابيتحسبش عليك — الدرجة بتتوزّع على الباقي. ومحدش بياخد صفر بالغلط.')
      + (isLeader?step('<b>للقادة:</b> التيم ليدر = نص درجته شغله + نص أداء فريقه. الأكونت مانجر = أداء فريقه.'):'' );

  // نصايح
  let tips = sec('💡 نصايح')
    + step('افتح «الأجندة» كل صبح — هي اللي بتقوللك تبدأ بإيه بالترتيب الصح.')
    + step('استخدم «تاسك» لأي شغل مساعد (ديزاين، خطة) عشان ما يلخبطش تقييمك، و«بوست» للمحتوى اللي بينزل فعلاً.')
    + step('حدّد الأولوية والمدة لكل حاجة — ده اللي بيخلّي الأجندة ترتّب صح.')
    + (isLeader ? step('راجع البوستات بسرعة عشان ما تعطّلش فريقك، ورجّع بملاحظة واضحة لو محتاج تعديل.') : step('لو البوست رجعلك بملاحظة، اقرأها كويس، عدّل، وارجّعه لـ «محتاج مراجعة» تاني.'));

  // أسئلة شائعة
  let faq = sec('❓ أسئلة شائعة')
    + qa('ليه مش لاقي مدرّسين؟', isLeader?'لازم تضيف مدرّس بزرار «＋ مدرّس» وتحدّد المسؤول عنه.':'لإن لسه محدش سلّمك مدرّسين. كلّم التيم ليدر أو الأكونت مانجر بتاعك.')
    + qa('الفرق بين البوست والتاسك؟','البوست = محتوى بينزل وبيتحاسب في تقييمك. التاسك = شغل مساعد مش بيتحاسب.')
    + qa('ليه التاسك مش ظاهرة في تقييمي؟','عمدًا — التاسكات مش بتدخل في الدرجة، عشان التقييم يكون على المحتوى اللي بينزل بس.')
    + qa('غيّرت صورتي إزاي؟','دوس على صورتك في القايمة الجنب، واختار ترفع صورة أو أفاتار جاهز.');

  return howto + scoring + tips + faq;
}
